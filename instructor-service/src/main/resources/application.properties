spring.application.name=instructor-service
server.port=8091

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5999}/${DB_NAME:cyberlearnix_instructor}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# JWT Configuration
jwt.secret=${JWT_SECRET}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Feign Client Configuration
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000

# Inter-service URLs
services.user-service.url=${USER_SERVICE_URL:http://localhost:8081}
services.course-service.url=${COURSE_SERVICE_URL:http://localhost:8082}
services.enrollment-service.url=${ENROLLMENT_SERVICE_URL:http://localhost:8083}

# Actuator — Kubernetes probe endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
