# =============================================================================
# Let's Encrypt ClusterIssuer — used by cert-manager to issue TLS certificates
# for all ingress hosts (api.cyberlearnix.com, lmsclass.cyberlearnix.com, etc.)
#
# Apply ONCE after cert-manager is installed:
#   kubectl apply -f k8s/cluster-issuer.yaml
#
# cert-manager then auto-issues and renews certs whenever it sees:
#   cert-manager.io/cluster-issuer: letsencrypt-prod
# on an Ingress resource.
# =============================================================================

# ── Staging issuer — unlimited requests, useful for testing ──────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@cyberlearnix.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

---

# ── Production issuer — real trusted certs, rate-limited ─────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@cyberlearnix.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
