apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-service
  namespace: cyberlearnix
  labels:
    app: website-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website-service
  template:
    metadata:
      labels:
        app: website-service
    spec:
      containers:
      - name: website-service
        image: website-service:latest
        imagePullPolicy: Never   # Using locally imported image (built on VPS, imported into containerd)
        ports:
        - containerPort: 8082
        envFrom:
        - secretRef:
            name: website-service-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
