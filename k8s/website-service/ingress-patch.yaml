apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: website-service-ingress
  namespace: cyberlearnix
  annotations:
    # Allow large file uploads (course thumbnails, banners, etc.)
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    # Use prefix path type — rewrite-target not needed since server.js handles full paths
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: apis.cyberlearnix.com
    http:
      paths:
      # --- Specific routes handled by website-service (Node.js/Express) ---
      # These MUST appear before the generic /api catch-all in gateway-service's ingress.
      # Kubernetes nginx ingress uses longest-prefix matching; a separate Ingress object
      # with more-specific paths will take precedence when both share the same host.

      - path: /api/upload-image
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              name: http

      - path: /auth/google
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              name: http

      - path: /api/banners
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              name: http

      - path: /api/partners
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              name: http

      - path: /api/courses
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              name: http

      - path: /api/course-management
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              name: http

      - path: /api/enrollments
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              name: http

      - path: /api/progress
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              name: http

      - path: /api/health
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              name: http
