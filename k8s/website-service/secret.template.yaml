# DO NOT COMMIT REAL VALUES — use the kubectl commands in DEPLOYMENT.md
# Apply real secrets with:
#   kubectl create secret generic website-service-secrets \
#     --namespace=cyberlearnix \
#     --from-literal=GOOGLE_CLIENT_ID="..." \
#     --from-literal=GOOGLE_CLIENT_SECRET="..." \
#     ... (see DEPLOYMENT.md for full command)
apiVersion: v1
kind: Secret
metadata:
  name: website-service-secrets
  namespace: cyberlearnix
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: "REPLACE_WITH_REAL_VALUE"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_REAL_VALUE"
  GOOGLE_REFRESH_TOKEN: "REPLACE_WITH_REAL_VALUE"
  OAUTH_CALLBACK_BASE_URL: "https://apis.cyberlearnix.com"
  GOOGLE_DRIVE_ROOT_FOLDER_ID: "REPLACE_WITH_REAL_VALUE"
  RESEND_API_KEY: "REPLACE_WITH_REAL_VALUE"
  GMAIL_USER: "REPLACE_WITH_REAL_VALUE"
  GMAIL_APP_PASSWORD: "REPLACE_WITH_REAL_VALUE"
  PAYU_MERCHANT_KEY: "REPLACE_WITH_REAL_VALUE"
  PAYU_SALT: "REPLACE_WITH_REAL_VALUE"
  PAYU_ENV: "production"
  GOOGLE_SERVICE_ACCOUNT_JSON: "REPLACE_WITH_REAL_VALUE"
