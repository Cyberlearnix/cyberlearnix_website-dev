apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cyberlearnix
  namespace: argocd
  # Auto-delete child resources when this Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # ── Source: your GitHub repo, helm/ directory ───────────────────────────────
  source:
    repoURL: https://github.com/Cyberlearnix/cyberlearnix_website-dev.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - values-k3s.yaml

  # ── Destination: cyberlearnix namespace on local k3s ───────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: cyberlearnix

  # ── Sync policy: auto-sync on every git push ────────────────────────────────
  syncPolicy:
    automated:
      prune: true        # delete resources removed from helm chart
      selfHeal: true     # auto-fix if someone manually edits a resource
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  # ── Health checks ───────────────────────────────────────────────────────────
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas   # ignore manual replica scaling
