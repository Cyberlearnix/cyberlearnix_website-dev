spring.application.name=course-service
server.port=8082

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5433}/${DB_NAME:cyberlearnix_courses}?options=-c%20timezone=UTC&timezone=UTC
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:Cyb3rL3arnix#2026!DB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Swagger Configuration
springdoc.api-docs.path=/api/courses/v3/api-docs

# JWT Configuration
jwt.secret=${JWT_SECRET:cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Multipart / File Upload Configuration (for media uploads to Cloudinary)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dt6rxrpqr}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:ml_default}
cloudinary.api-key=${CLOUDINARY_API_KEY:#{null}}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:#{null}}

# Inter-service URLs
services.user-service.url=${USER_SERVICE_URL:http://localhost:8081}
services.enrollment-service.url=${ENROLLMENT_SERVICE_URL:http://localhost:8083}
