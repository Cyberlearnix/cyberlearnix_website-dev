spring.application.name=course-service
server.port=8082

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5999}/${DB_NAME:cyberlearnix_courses}?options=-c%20timezone=UTC&timezone=UTC
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:Cyb3rL3arnix#2026!DB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Swagger Configuration
springdoc.api-docs.path=/api/courses/v3/api-docs

# JWT Configuration
jwt.secret=${JWT_SECRET:cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant}

# Actuator — Kubernetes probe endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Multipart / File Upload Configuration (for media uploads to Google Drive)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB


# Google Drive Configuration (optional — leave blank to disable)
# Base64-encode your service account JSON:
#   PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("path\to\key.json"))
#   Linux/Mac:  base64 -w 0 path/to/key.json
google.drive.credentials-json-b64=${GOOGLE_DRIVE_CREDENTIALS_JSON_B64:}
# The Drive folder ID to upload files into (from the folder URL: .../folders/<FOLDER_ID>)
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:}

# Inter-service URLs
services.user-service.url=${USER_SERVICE_URL:http://localhost:8081}
services.enrollment-service.url=${ENROLLMENT_SERVICE_URL:http://localhost:8083}

