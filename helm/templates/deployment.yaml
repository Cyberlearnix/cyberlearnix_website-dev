{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cyberlearnix.labels" (dict "serviceName" $name "root" $) | nindent 4 }}
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: {{ $svc.replicas | default 1 }}
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      {{- include "cyberlearnix.selectorLabels" (dict "serviceName" $name "root" $) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # never remove old pod until new pod passes readiness — zero downtime
      maxSurge: 1         # allow 1 extra pod during rollout; DB connections: 10 svcs × 3 pool × 2 = 60 (safe under Postgres 100)
  template:
    metadata:
      labels:
        {{- include "cyberlearnix.labels" (dict "serviceName" $name "root" $) | nindent 8 }}
      annotations:
        # Restart pods when ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $ | sha256sum }}
    spec:
      serviceAccountName: {{ $name }}
      automountServiceAccountToken: false
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler

      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.imagePullSecrets | nindent 8 }}
      {{- end }}

      # Level-1 Pod security: all containers run non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Spread pods across nodes to survive a node failure.
      # whenUnsatisfiable: DoNotSchedule (multi-node) or ScheduleAnyway (single-node K3s)
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ $.Values.topology.whenUnsatisfiable | default "DoNotSchedule" }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $name }}

      terminationGracePeriodSeconds: 60

      {{- if $svc.dbRequired }}
      # Ensure the service database exists before the app container starts.
      # Runs on every pod start — idempotent (CREATE DATABASE skipped if DB exists).
      initContainers:
        - name: create-database
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyberlearnix-secrets
                  key: db-password
            - name: DB_NAME
              value: {{ $svc.dbName | quote }}
            - name: PSQL_HISTORY
              value: /dev/null
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h postgres -U postgres; do sleep 2; done
              echo "Checking database: $DB_NAME"
              psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 \
                || psql -h postgres -U postgres -c "CREATE DATABASE \"$DB_NAME\""
              echo "Database $DB_NAME is ready."
      {{- end }}

      containers:
        - name: {{ $name }}
          image: {{ include "cyberlearnix.image" (dict "serviceName" $name "root" $) }}
          imagePullPolicy: {{ $.Values.global.pullPolicy }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File

          ports:
            - name: http
              containerPort: {{ $svc.containerPort | default 8080 }}
              protocol: TCP

          # Shared app config from ConfigMap
          envFrom:
            - configMapRef:
                name: cyberlearnix-config

          # Per-service env overrides
          env:
            - name: SERVER_PORT
              value: {{ $svc.containerPort | default 8080 | quote }}
            - name: SPRING_APPLICATION_NAME
              value: {{ $name | quote }}
            {{- if $svc.dbRequired }}
            - name: DB_HOST
              value: {{ $.Values.appConfig.DB_HOST | quote }}
            - name: DB_PORT
              value: {{ $.Values.appConfig.DB_PORT | quote }}
            - name: DB_USER
              value: {{ $.Values.appConfig.DB_USER | quote }}
            - name: DB_NAME
              value: {{ $svc.dbName | quote }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: cyberlearnix-secrets
                  key: db-password
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cyberlearnix-secrets
                  key: jwt-secret
            {{- if eq $name "gateway-service" }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyberlearnix-secrets
                  key: redis-password
                  optional: true
            {{- end }}
            {{- if or (eq $name "course-service") (eq $name "cms-service") }}
            - name: GOOGLE_DRIVE_CREDENTIALS_JSON_B64
              valueFrom:
                secretKeyRef:
                  name: cyberlearnix-secrets
                  key: google-drive-credentials-json-b64
                  optional: true
            - name: GOOGLE_DRIVE_FOLDER_ID
              valueFrom:
                secretKeyRef:
                  name: cyberlearnix-secrets
                  key: google-drive-folder-id
                  optional: true
            {{- end }}
            {{- if or (eq $name "user-service") (eq $name "notification-service") }}
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyberlearnix-secrets
                  key: mail-password
                  optional: true
                  optional: false
            {{- end }}
            {{- if eq $name "user-service" }}
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cyberlearnix-secrets
                  key: resend-api-key
                  optional: true
                  optional: false
            {{- end }}

          resources:
            {{- toYaml $svc.resources | nindent 12 }}

          # Liveness: is the JVM alive? TCP check avoids DB-health false positives.
          # HTTP /actuator/health would return 503 if Postgres is slow -> kills healthy pods.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness: is the service ready for traffic?
          # /actuator/health/readiness returns 200 when the app is ready (excludes mail/external checks)
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Startup: TCP check — passes as soon as Tomcat opens the port.
          # HTTP would fail if DB health is DOWN even after Tomcat is up.
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60   # 15s + 60×10s = up to 10 minutes to start

          # Level-2 Container security
          {{- if $svc.dockerSocket }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              drop: [ALL]
              add: [SETUID, SETGID]
          {{- else }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          {{- end }}

          # /tmp needed for Spring Boot temp files (uploads, Tomcat work dir)
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
            {{- if $svc.dockerSocket }}
            - name: docker-sock
              mountPath: /var/run/docker.sock
            {{- end }}

      volumes:
        - name: tmp-dir
          emptyDir:
            sizeLimit: 256Mi
        {{- if $svc.dockerSocket }}
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        {{- end }}

{{- end }}
