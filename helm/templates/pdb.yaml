{{- range $name, $svc := .Values.services }}
{{- if $svc.pdb }}
{{- $replicas := $svc.replicas | default 1 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cyberlearnix.labels" (dict "serviceName" $name "root" $) | nindent 4 }}
spec:
  {{- if gt (int $replicas) 1 }}
  # Multi-replica: keep at least 1 alive during disruptions
  minAvailable: 1
  {{- else }}
  # Single-replica: allow 1 unavailable so node drain is never permanently blocked.
  # Brief downtime during drain is acceptable; use maxUnavailable not minAvailable.
  maxUnavailable: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "cyberlearnix.selectorLabels" (dict "serviceName" $name "root" $) | nindent 6 }}
{{- end }}
{{- end }}
