{{- range $name, $svc := .Values.services }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cyberlearnix.labels" (dict "serviceName" $name "root" $) | nindent 4 }}
  annotations:
    # Azure Workload Identity: link to managed identity for Azure Key Vault access
    # Set these once your Azure managed identity is configured:
    # azure.workload.identity/client-id: "<MANAGED_IDENTITY_CLIENT_ID>"
automountServiceAccountToken: false
{{- end }}
