{{- range $name, $svc := .Values.services }}
{{- if $svc.ingress }}
{{- if $svc.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cyberlearnix.labels" (dict "serviceName" $name "root" $) | nindent 4 }}
  annotations:
    {{- toYaml $.Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  {{- if $.Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $.Values.hosts.api }}
        {{- if $.Values.hosts.lms }}
        - {{ $.Values.hosts.lms }}
        {{- end }}
      secretName: {{ $.Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    {{- if $.Values.hosts.api }}
    - host: {{ $.Values.hosts.api }}
      http:
        paths:
          - path: {{ $svc.ingress.path | default "/" }}
            pathType: {{ $svc.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
    {{- end }}
    {{- if $.Values.hosts.lms }}
    - host: {{ $.Values.hosts.lms }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
    {{- end }}
    {{- if not $.Values.hosts.api }}
    - http:
        paths:
          - path: {{ $svc.ingress.path | default "/" }}
            pathType: {{ $svc.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
    {{- end }}
{{- end }}
{{- end }}
{{- /* ── Dedicated WebSocket Ingress for lab terminal ─────────────────────────────
     Routes /labs/terminal directly to lab-service, bypassing Spring Cloud Gateway.
     Spring Cloud Gateway (Reactor Netty WebsocketRoutingFilter) re-encodes frames
     on the gateway→lab-service leg, causing immediate 1002 close.
     lab-service validates JWT from the ?token= query param itself.
     Needs its own Ingress to get 3600s timeouts (shared ingress uses 120s).
     ──────────────────────────────────────────────────────────────────────────── */}}
{{- if .Values.hosts.api }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lab-service-terminal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cyberlearnix.labels" (dict "serviceName" "lab-service" "root" .) | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.hosts.api }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.hosts.api }}
      http:
        paths:
          - path: /labs/terminal
            pathType: Prefix
            backend:
              service:
                name: lab-service
                port:
                  name: http
{{- end }}
{{- end }}
