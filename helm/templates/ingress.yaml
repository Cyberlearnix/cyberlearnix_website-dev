{{- range $name, $svc := .Values.services }}
{{- if $svc.ingress }}
{{- if $svc.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cyberlearnix.labels" (dict "serviceName" $name "root" $) | nindent 4 }}
  annotations:
    {{- toYaml $.Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  {{- if $.Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $.Values.hosts.api }}
        {{- if $.Values.hosts.lms }}
        - {{ $.Values.hosts.lms }}
        {{- end }}
      secretName: {{ $.Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    {{- if $.Values.hosts.api }}
    - host: {{ $.Values.hosts.api }}
      http:
        paths:
          - path: {{ $svc.ingress.path | default "/" }}
            pathType: {{ $svc.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
          {{- if eq $name "gateway-service" }}
          {{- /* Route WebSocket terminal DIRECTLY to lab-service, bypassing the gateway.
               Spring Cloud Gateway 4.1 re-frames binary WebSocket messages and may close
               with 1002 (protocol error). Going nginx -> lab-service avoids double proxying.
               lab-service validates the JWT itself from the ?token= query param. */}}
          - path: /labs/terminal
            pathType: Prefix
            backend:
              service:
                name: lab-service
                port:
                  name: http
          {{- end }}
    {{- end }}
    {{- if $.Values.hosts.lms }}
    - host: {{ $.Values.hosts.lms }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
          {{- if eq $name "gateway-service" }}
          - path: /labs/terminal
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  name: http
          {{- end }}
    {{- end }}
    {{- if not $.Values.hosts.api }}
    - http:
        paths:
          - path: {{ $svc.ingress.path | default "/" }}
            pathType: {{ $svc.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
