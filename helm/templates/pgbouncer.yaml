{{- if .Values.pgbouncer.enabled }}
---
# ── PgBouncer connection pooler ───────────────────────────────────────────────
# Apps connect to pgbouncer:5432 (transaction pooling).
# PgBouncer maintains a small pool of real Postgres connections (~20 total)
# instead of each JVM holding its own open connections (~60-120 raw connections).
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/part-of: cyberlearnix
data:
  pgbouncer.ini: |
    [databases]
    * = host=postgres port=5432

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 200
    default_pool_size = 20
    min_pool_size = 2
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    server_idle_timeout = 600
    client_idle_timeout = 600
    log_connections = 0
    log_disconnections = 0
    ignore_startup_parameters = extra_float_digits,options
    server_reset_query = DISCARD ALL
    tcp_keepalive = 1
    tcp_keepidle = 60
    tcp_keepintvl = 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/part-of: cyberlearnix
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
        app.kubernetes.io/part-of: cyberlearnix
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      terminationGracePeriodSeconds: 30
      initContainers:
        # Writes userlist.txt from the DB secret at pod start so credentials stay in sync
        - name: write-userlist
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              echo "\"postgres\" \"$DB_PASS\"" > /etc/pgbouncer/userlist.txt
              chmod 600 /etc/pgbouncer/userlist.txt
          env:
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: cyberlearnix-secrets
                  key: db-password
          volumeMounts:
            - name: pgbouncer-userlist
              mountPath: /etc/pgbouncer
      containers:
        - name: pgbouncer
          image: bitnami/pgbouncer:1.22.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: PGBOUNCER_SET_DATABASE_USER
              value: "no"
            - name: PGBOUNCER_SET_DATABASE_PASSWORD
              value: "no"
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /bitnami/pgbouncer/conf/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
            - name: pgbouncer-userlist
              mountPath: /etc/pgbouncer
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: pgbouncer-config
          configMap:
            name: pgbouncer-config
        - name: pgbouncer-userlist
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/part-of: cyberlearnix
spec:
  selector:
    app.kubernetes.io/name: pgbouncer
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
{{- end }}
