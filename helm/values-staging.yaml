# Staging environment overrides
global:
  environment: staging

appConfig:
  SPRING_PROFILES_ACTIVE: "prod,staging"
  DB_HOST: "cyberlearnix-pg-staging.postgres.database.azure.com"
  REDIS_HOST: "cyberlearnix-redis-staging.redis.cache.windows.net"
  CORS_ALLOWED_ORIGINS: "https://staging.cyberlearnix.com,http://localhost:3000,http://localhost:5173"

hosts:
  api: api-staging.cyberlearnix.com

ingress:
  tls:
    secretName: cyberlearnix-staging-tls

# Lower replica counts and resource limits in staging
services:
  gateway-service:
    replicas: 1
    hpa:
      minReplicas: 1
      maxReplicas: 3
    resources:
      requests:
        memory: "192Mi"
        cpu: "50m"
      limits:
        memory: "384Mi"
        cpu: "300m"

  user-service:
    replicas: 1
    hpa:
      minReplicas: 1
      maxReplicas: 2

  course-service:
    replicas: 1
    hpa:
      minReplicas: 1
      maxReplicas: 2

  enrollment-service:
    replicas: 1
    hpa:
      minReplicas: 1
      maxReplicas: 2
