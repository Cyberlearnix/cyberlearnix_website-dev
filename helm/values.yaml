# =============================================================================
# Cyberlearnix Helm Values — Default (shared across environments)
# Override with values-staging.yaml or values-production.yaml
# =============================================================================

global:
  registry: swachvegaregistry.azurecr.io
  imagePrefix: ""       # set to "cyberlearnix-" for Docker Hub (K3s) deployments
  pullPolicy: IfNotPresent
  environment: staging

# ── Image pull secrets (empty = ACR managed identity; set for Docker Hub) ────
imagePullSecrets: []

# ── Topology spread — single-node K3s override to ScheduleAnyway ─────────────
topology:
  whenUnsatisfiable: DoNotSchedule

# ── Image tags ──────────────────────────────────────────────────────────────
# Updated per deployment by GitHub Actions (image-override.yaml injected)
images:
  gateway-service: latest
  user-service: latest
  course-service: latest
  enrollment-service: latest
  notification-service: latest
  shop-service: latest
  form-service: latest
  admin-service: latest
  cms-service: latest
  instructor-service: latest
  attendance-service: latest
  lab-service: latest

# ── Shared application config (injected as ConfigMap) ────────────────────────
appConfig:
  SPRING_PROFILES_ACTIVE: "prod"
  DB_HOST: ""          # OVERRIDE per environment
  DB_PORT: "5432"
  DB_USER: "postgres"
  REDIS_HOST: ""       # OVERRIDE per environment
  REDIS_PORT: "6379"
  # JVM tuning — overrides Dockerfile JAVA_TOOL_OPTIONS; reduces heap from 75%→50% of container limit,
  # caps Metaspace+CodeCache to prevent unbounded growth, uses SerialGC (lower overhead than G1GC on constrained nodes)
  JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=50.0 -XX:+ExitOnOutOfMemoryError -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=64m -Djava.security.egd=file:/dev/./urandom -Dspring.output.ansi.enabled=NEVER"
  # Inter-service URLs — use Kubernetes DNS (service.namespace.svc.cluster.local)
  USER_SERVICE_URL: "http://user-service:8081"
  COURSE_SERVICE_URL: "http://course-service:8082"
  ENROLLMENT_SERVICE_URL: "http://enrollment-service:8083"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8084"
  SHOP_SERVICE_URL: "http://shop-service:8085"
  FORM_SERVICE_URL: "http://form-service:8087"
  CMS_SERVICE_URL: "http://cms-service:8089"
  ADMIN_SERVICE_URL: "http://admin-service:8090"
  INSTRUCTOR_SERVICE_URL: "http://instructor-service:8091"
  ATTENDANCE_SERVICE_URL: "http://attendance-service:8092"
  LAB_SERVICE_URL: "http://lab-service:8090"
  CORS_ALLOWED_ORIGINS: "https://app.cyberlearnix.com,https://staging.cyberlearnix.com"

# ── Per-service configuration ─────────────────────────────────────────────────
# Keys must match the service name in docker-compose.yml exactly
services:

  gateway-service:
    port: 8080
    containerPort: 8080
    replicas: 1
    dbRequired: false
    ingress:
      enabled: true
      path: /
      pathType: Prefix
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  user-service:
    port: 8081
    containerPort: 8081
    replicas: 1
    dbName: cyberlearnix_users
    dbRequired: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  course-service:
    port: 8082
    containerPort: 8082
    replicas: 1
    dbName: cyberlearnix_courses
    dbRequired: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  enrollment-service:
    port: 8083
    containerPort: 8083
    replicas: 1
    dbName: cyberlearnix_enrollments
    dbRequired: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  notification-service:
    port: 8084
    containerPort: 8084
    replicas: 1
    dbRequired: false
    ingress:
      enabled: false
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "320Mi"
        cpu: "250m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  shop-service:
    port: 8085
    containerPort: 8085
    replicas: 1
    dbName: cyberlearnix_shop
    dbRequired: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  form-service:
    port: 8087
    containerPort: 8087
    replicas: 1
    dbName: cyberlearnix_forms
    dbRequired: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  admin-service:
    port: 8090
    containerPort: 8090
    replicas: 1
    dbName: cyberlearnix_admin
    dbRequired: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: false   # Admin traffic is low
    pdb:
      minAvailable: 1

  cms-service:
    port: 8089
    containerPort: 8089
    replicas: 1
    dbName: cyberlearnix_cms
    dbRequired: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: false
    pdb:
      minAvailable: 1

  instructor-service:
    port: 8091
    containerPort: 8091
    replicas: 1
    dbName: cyberlearnix_instructor
    dbRequired: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  attendance-service:
    port: 8092
    containerPort: 8092
    replicas: 1
    dbName: cyberlearnix_attendance
    dbRequired: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "500m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  lab-service:
    port: 8090
    containerPort: 8090
    replicas: 1
    dbName: lab_db
    dbRequired: true
    dockerSocket: true
    ingress:
      enabled: false
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    hpa:
      enabled: false
    pdb:
      minAvailable: 1

# ── Ingress (gateway-service is the only external entry point) ───────────────
ingress:
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: cyberlearnix-tls

# ── NGINX Ingress hosts (override per environment) ───────────────────────────
hosts:
  api: api.cyberlearnix.com

# ── PgBouncer connection pooler ───────────────────────────────────────────────
# When enabled, apps connect to pgbouncer:5432 instead of postgres:5432.
# Pools ~60 raw JVM connections down to ~20 real Postgres connections.
# Disabled by default — enable per-environment in values-*.yaml
pgbouncer:
  enabled: false

# ── Dev namespace scale schedule ─────────────────────────────────────────────
# Scales all services to 0 at night and back up in the morning.
# Only enable in the dev (cyberlearnix) namespace — NOT in production.
# Times are in IST (Asia/Kolkata). Saves ~5GB RAM during off-hours.
devScaleSchedule:
  enabled: false
  downCron: "30 18 * * *"   # 18:30 UTC = midnight IST (00:00)
  upCron: "30 2 * * *"      # 02:30 UTC = 08:00 IST
