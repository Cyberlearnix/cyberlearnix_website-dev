<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Your Password — Cyberlearnix Student Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: .18; pointer-events: none; z-index: 0; }
    .bg-blob-1 { width: 420px; height: 420px; background: var(--cl-teal);   top: -80px;  left: -80px; }
    .bg-blob-2 { width: 360px; height: 360px; background: var(--cl-purple); bottom: -60px; right: -60px; }

    .update-pw-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 24px;
    }

    .card {
      background: var(--cl-white);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .card-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--cl-teal), var(--cl-teal-dark));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 20px;
    }

    .card-title {
      font-size: 1.45rem;
      font-weight: 800;
      text-align: center;
      color: var(--cl-navy);
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 0.875rem;
      color: var(--cl-muted);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .alert {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }
    .alert.visible { display: block; }
    .alert-error   { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--cl-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .password-wrap { position: relative; }
    .form-input {
      width: 100%;
      padding: 11px 40px 11px 14px;
      border: 2px solid var(--cl-border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      transition: border-color var(--transition);
      background: var(--cl-bg);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--cl-teal);
      background: #fff;
    }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; color: var(--cl-muted);
      padding: 0; background: none; border: none;
      cursor: pointer; line-height: 1;
    }

    .strength-bar {
      height: 4px;
      border-radius: 4px;
      margin-top: 6px;
      background: var(--cl-border);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 4px;
      transition: width .3s, background .3s;
    }
    .strength-label {
      font-size: 0.75rem;
      color: var(--cl-muted);
      margin-top: 4px;
      min-height: 16px;
    }

    .btn-primary {
      width: 100%;
      padding: 13px 20px;
      background: linear-gradient(135deg, var(--cl-teal), var(--cl-teal-dark));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-primary.loading { pointer-events: none; }

    .requirement-list {
      font-size: 0.78rem;
      color: var(--cl-muted);
      margin-top: 8px;
      padding-left: 4px;
    }
    .requirement-list li {
      list-style: none;
      padding: 2px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .req-icon { font-size: 12px; }
    .req-met  { color: #22c55e; }
    .req-fail { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <main class="update-pw-page">
    <div class="card">
      <div class="card-icon">🔐</div>
      <h1 class="card-title">Set Your Password</h1>
      <p class="card-subtitle">Welcome to Cyberlearnix! Please set a strong password before continuing to your dashboard.</p>

      <div id="alertBox" class="alert"></div>

      <form id="updateForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <div class="password-wrap">
            <input type="password" id="newPassword" class="form-input" placeholder="Create a strong password" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" id="toggleNew" aria-label="Toggle password visibility">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel"></div>
          <ul class="requirement-list" id="reqList">
            <li id="req-len"><span class="req-icon req-fail">○</span> At least 8 characters</li>
            <li id="req-upper"><span class="req-icon req-fail">○</span> One uppercase letter</li>
            <li id="req-lower"><span class="req-icon req-fail">○</span> One lowercase letter</li>
            <li id="req-digit"><span class="req-icon req-fail">○</span> One number</li>
            <li id="req-special"><span class="req-icon req-fail">○</span> One special character (@$!%*?&)</li>
          </ul>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your new password" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Toggle confirm password visibility">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span id="btnIcon">🔒</span>
          <span id="btnText">Set Password &amp; Continue</span>
        </button>
      </form>
    </div>
  </main>

  <script>
    'use strict';

    const API_BASE = '/api';
    const LS = { TOKEN: 'cl_token', USER_ID: 'cl_user_id', ROLE: 'cl_role', NAME: 'cl_user_name' };

    // Guard: must be logged in as student to access this page
    (function guard() {
      const token = localStorage.getItem(LS.TOKEN);
      const role  = localStorage.getItem(LS.ROLE);
      if (!token || role !== 'STUDENT') {
        window.location.replace('index.html');
      }
    })();

    /* ── DOM refs ──────────────────────────────── */
    const form        = document.getElementById('updateForm');
    const newPwInp    = document.getElementById('newPassword');
    const confirmInp  = document.getElementById('confirmPassword');
    const alertBox    = document.getElementById('alertBox');
    const submitBtn   = document.getElementById('submitBtn');
    const btnText     = document.getElementById('btnText');
    const btnIcon     = document.getElementById('btnIcon');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');

    /* ── Toggle visibility ─────────────────────── */
    document.getElementById('toggleNew').addEventListener('click', () => {
      const show = newPwInp.type === 'password';
      newPwInp.type = show ? 'text' : 'password';
      document.getElementById('toggleNew').textContent = show ? '🙈' : '👁';
    });
    document.getElementById('toggleConfirm').addEventListener('click', () => {
      const show = confirmInp.type === 'password';
      confirmInp.type = show ? 'text' : 'password';
      document.getElementById('toggleConfirm').textContent = show ? '🙈' : '👁';
    });

    /* ── Alert helpers ─────────────────────────── */
    function showAlert(msg, type = 'error') {
      alertBox.textContent = msg;
      alertBox.className = `alert alert-${type} visible`;
    }
    function clearAlert() {
      alertBox.className = 'alert';
      alertBox.textContent = '';
    }

    /* ── Password strength meter ──────────────── */
    const checks = {
      len:     pw => pw.length >= 8,
      upper:   pw => /[A-Z]/.test(pw),
      lower:   pw => /[a-z]/.test(pw),
      digit:   pw => /\d/.test(pw),
      special: pw => /[@$!%*?&]/.test(pw),
    };

    function updateRequirement(id, met) {
      const li = document.getElementById(`req-${id}`);
      if (!li) return;
      const icon = li.querySelector('.req-icon');
      icon.textContent = met ? '●' : '○';
      icon.className = `req-icon ${met ? 'req-met' : 'req-fail'}`;
    }

    newPwInp.addEventListener('input', () => {
      const pw = newPwInp.value;
      let score = 0;
      Object.entries(checks).forEach(([key, fn]) => {
        const met = fn(pw);
        updateRequirement(key, met);
        if (met) score++;
      });

      const pct = (score / 5) * 100;
      strengthFill.style.width = pct + '%';

      if (score <= 1) {
        strengthFill.style.background = '#ef4444';
        strengthLabel.textContent = pw.length ? 'Very weak' : '';
      } else if (score === 2) {
        strengthFill.style.background = '#f97316';
        strengthLabel.textContent = 'Weak';
      } else if (score === 3) {
        strengthFill.style.background = '#eab308';
        strengthLabel.textContent = 'Fair';
      } else if (score === 4) {
        strengthFill.style.background = '#22c55e';
        strengthLabel.textContent = 'Good';
      } else {
        strengthFill.style.background = '#0ea5e9';
        strengthLabel.textContent = 'Strong ✓';
      }
    });

    /* ── Form submit ───────────────────────────── */
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const newPassword     = newPwInp.value;
      const confirmPassword = confirmInp.value;

      if (!newPassword || !confirmPassword) {
        showAlert('Please fill in both password fields.');
        return;
      }
      if (newPassword !== confirmPassword) {
        showAlert('Passwords do not match. Please check and try again.');
        return;
      }
      if (newPassword.length < 8) {
        showAlert('Password must be at least 8 characters.');
        return;
      }

      const token = localStorage.getItem(LS.TOKEN);
      if (!token) {
        showAlert('Session expired. Please log in again.');
        setTimeout(() => window.location.replace('index.html'), 2000);
        return;
      }

      submitBtn.disabled = true;
      btnIcon.textContent = '⏳';
      btnText.textContent = 'Updating…';

      try {
        const res = await fetch(`${API_BASE}/auth/change-password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ newPassword, confirmPassword })
        });

        if (res.ok) {
          showAlert('Password updated successfully! Taking you to your dashboard…', 'success');
          btnIcon.textContent = '✅';
          btnText.textContent = 'Done!';
          setTimeout(() => window.location.replace('dashboard.html'), 2000);
        } else {
          let msg = 'Failed to update password. Please try again.';
          try {
            const body = await res.json();
            msg = body.error || body.message || msg;
          } catch (_) { /* ignore */ }
          showAlert(msg);
          submitBtn.disabled = false;
          btnIcon.textContent = '🔒';
          btnText.textContent = 'Set Password & Continue';
        }

      } catch (err) {
        console.error('[UpdatePw]', err);
        showAlert('Network error. Please check your connection and try again.');
        submitBtn.disabled = false;
        btnIcon.textContent = '🔒';
        btnText.textContent = 'Set Password & Continue';
      }
    });
  </script>
</body>
</html>
