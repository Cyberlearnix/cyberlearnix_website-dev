spring.application.name=cms-service
server.port=8089

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5999}/${DB_NAME:cyberlearnix_cms}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:Cyb3rL3arnix#2026!DB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# JWT Configuration
jwt.secret=${JWT_SECRET:cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Multipart / File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dt6rxrpqr}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:ml_default}
cloudinary.api-key=${CLOUDINARY_API_KEY:#{null}}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:#{null}}

# Swagger Configuration
springdoc.api-docs.path=/api/cms/v3/api-docs

# Actuator — Kubernetes probe endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
