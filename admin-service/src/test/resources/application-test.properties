# Test profile — H2 replaces PostgreSQL; no external services needed
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.liquibase.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Dummy JWT secret (HS512 needs >= 64 chars)
jwt.secret=test-secret-key-for-unit-tests-at-least-64-chars-to-satisfy-hmac-sha512-minimum-length

# Zoho stub values — TeamsService skips HTTP discovery when org-id != "0"
zoho.org-id=test-org-id
zoho.host-zuid=test-host-zuid
zoho.client-id=test-client-id
zoho.client-secret=test-client-secret
zoho.refresh-token=test-refresh-token
