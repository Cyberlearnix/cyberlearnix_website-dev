# ═══════════════════════════════════════════════════════════════════════════════
# Zoho Sync Scheduler Tuning (all values in milliseconds)
# ═══════════════════════════════════════════════════════════════════════════════

# How often to pull ALL meetings from Zoho (default: every 5 minutes)
zoho.sync.meetings-interval-ms=300000
# Wait this long after startup before first meeting sync
zoho.sync.meetings-initial-delay-ms=30000

# How often to pull attendance for ended meetings (default: every 10 minutes)
zoho.sync.participants-interval-ms=600000
# Wait this long after startup before first participant sync
zoho.sync.participants-initial-delay-ms=60000