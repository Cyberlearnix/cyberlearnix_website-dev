spring:
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  application:
    name: gateway-service
  codec:
    max-in-memory-size: 512MB
  servlet:
    multipart:
      enabled: true
      max-file-size: 512MB
      max-request-size: 512MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5433}/${DB_NAME:cyberlearnix_gateway}?currentSchema=public
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  cloud:
    gateway:
      routes:
        # Auth Service (on user-service)
        - id: auth-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/auth/**

        # User Service Bridge
        - id: user-service-legacy
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/get-users,/api/create-user,/api/admin-reset-password-and-notify,/api/manage-teacher-permissions
          filters:
            - name: RewritePath
              args:
                regexp: /api/get-users
                replacement: /api/users
            - name: RewritePath
              args:
                regexp: /api/create-user
                replacement: /api/users/create-user
            - name: RewritePath
              args:
                regexp: /api/admin-reset-password-and-notify
                replacement: /api/users/reset-password
            - name: RewritePath
              args:
                regexp: /api/manage-teacher-permissions
                replacement: /api/users/permissions

        # Course Service Bridge (legacy path aliases)
        - id: course-service-legacy
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/manage-course-teachers
          filters:
            - name: RewritePath
              args:
                regexp: /api/manage-course-teachers
                replacement: /api/courses/teachers

        - id: user-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/users/**, /api/send-form-receipt, /api/send-form-notification, /api/send-reply, /api/send-email, /api/careers, /api/careers/**, /api/contact-submissions, /api/contact-submissions/**, /api/site-settings, /api/site-settings/**, /api/menus, /api/menus/**, /api/chatbot, /api/chatbot/**, /api/teams, /api/teams/**
        
        # User-status toggle (PATCH /api/users/{id}/status)
        - id: user-status-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/users/*/status

        # Course Service
        - id: course-service
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/courses/**, /api/course-management/**, /api/materials/**, /api/partners/**, /api/updates, /api/updates/**, /api/banners, /api/banners/**, /api/promos, /api/promos/**, /api/content-reviews, /api/content-reviews/**
        - id: course-service-suggestions
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/suggestions/**

        # Enrollment Service Bridge
        - id: enrollment-service-legacy
          uri: http://127.0.0.1:8083
          predicates:
            - Path=/api/manage-enrollments,/api/manage-forms,/api/manage-enrollment-responses
          filters:
            - name: RewritePath
              args:
                regexp: /api/manage-enrollments
                replacement: /api/enrollments
            - name: RewritePath
              args:
                regexp: /api/manage-forms
                replacement: /api/enrollments/forms
            - name: RewritePath
              args:
                regexp: /api/manage-enrollment-responses
                replacement: /api/enrollments/responses

        - id: enrollment-service
          uri: http://127.0.0.1:8083
          predicates:
            - Path=/api/enrollments/**, /api/payments/**, /api/payu-payment

        # Others
        - id: notification-service
          uri: http://127.0.0.1:8084
          predicates:
            - Path=/api/notifications/**
        - id: shop-service
          uri: http://127.0.0.1:8085
          predicates:
            - Path=/api/shop/**

        # Form Service
        - id: form-service
          uri: http://127.0.0.1:8087
          predicates:
            - Path=/api/forms, /api/forms/**

        - id: activity-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/activity/**

        # CMS Service & Unified Page Route
        - id: cms-service
          uri: http://127.0.0.1:8089
          predicates:
            - Path=/api/cms/**, /api/pages, /api/pages/**
          filters:
            # Route /api/pages and /api/pages/** to /api/cms/pages
            - name: RewritePath
              args:
                regexp: /api/pages(?<remaining>.*)
                replacement: /api/cms/pages${remaining}
            # Route CMS forms to Form Service
            - name: RewritePath
              args:
                regexp: /api/cms/forms/(?<formId>.*)/submit
                replacement: /api/forms/${formId}/responses

        # Admin Service
        - id: admin-service
          uri: http://127.0.0.1:8090
          predicates:
            - Path=/api/admin/**

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant}

springdoc:
  swagger-ui:
    urls:
      - name: auth-service
        url: /api/auth/v3/api-docs
      - name: course-service
        url: /api/courses/v3/api-docs
      - name: enrollment-service
        url: /api/enrollments/v3/api-docs
      - name: notification-service
        url: /api/notifications/v3/api-docs
      - name: shop-service
        url: /api/shop/v3/api-docs
      - name: form-service
        url: /api/forms/v3/api-docs
      - name: cms-service
        url: /api/cms/v3/api-docs
      - name: admin-service
        url: /api/admin/v3/api-docs
