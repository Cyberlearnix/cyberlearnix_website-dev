# Test profile — no web server, no Redis, no external connections
# Spring Cloud Gateway uses WebFlux + Redis; both are disabled here so the
# context can load without any running infrastructure.
spring.main.web-application-type=none
spring.cloud.gateway.enabled=false
spring.flyway.enabled=false
spring.liquibase.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.ReactiveRedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT — must provide a default so @Value("${jwt.secret}") in JwtAuthenticationFilter resolves
jwt.secret=test-secret-key-for-ci-only-do-not-use-in-production-xxxxxxxxxxxxxxxxxxx
