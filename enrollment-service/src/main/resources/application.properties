spring.application.name=enrollment-service
server.port=8083

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5999}/${DB_NAME:cyberlearnix_enrollments}?options=-c%20timezone=UTC&timezone=UTC
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:Cyb3rL3arnix#2026!DB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Swagger Configuration
springdoc.api-docs.path=/api/enrollments/v3/api-docs
# PayU Configuration
payu.merchant.key=${PAYU_MERCHANT_KEY:}
payu.merchant.salt=${PAYU_SALT:}
payu.base.url=${PAYU_BASE_URL:https://secure.payu.in}
# Frontend URL for PayU success/failure redirects
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# JWT Configuration
jwt.secret=${JWT_SECRET:cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant}

# Inter-service URLs
services.user-service.url=${USER_SERVICE_URL:http://localhost:8081}
services.course-service.url=${COURSE_SERVICE_URL:http://localhost:8082}
services.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}

# Feign Client Configuration
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000

# Actuator — Kubernetes probe endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
