worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # File upload size limit (covers 500MB video uploads + overhead)
    client_max_body_size 600M;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream: Spring Cloud API Gateway
    upstream api_gateway {
        server gateway-service:8080;
        keepalive 32;
    }

    # ── Shared location blocks (included in HTTPS server) ────────────────────
    # Defined as a macro via map trick — actual locations live in HTTPS server.

    # ── HTTP: ACME challenge + redirect everything to HTTPS (cyberlearnix.com) ─
    server {
        listen 80;
        server_name cyberlearnix.com www.cyberlearnix.com;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTP: ACME challenge + redirect everything to HTTPS ──────────────────
    server {
        listen 80;
        server_name apis.cyberlearnix.com;

        # Let's Encrypt webroot challenge — must be served over HTTP
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTP catch-all: health probe + direct-IP API access (TEMP: revert after DNS propagates) ──
    server {
        listen 80 default_server;
        server_name _;

        location = /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location ~* /actuator {
            return 403;
        }

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_connect_timeout 15s;
            proxy_read_timeout    600s;
            proxy_send_timeout    600s;
        }

        # Lab WebSocket terminal — bypass gateway, direct to lab-service
        # Gateway's Reactor Netty re-frames binary WebSocket messages causing 1002.
        # lab-service validates the JWT from the ?token= query param directly.
        location /labs/terminal/ {
            proxy_pass         http://lab-service:8090;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 15s;
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }

        location / {
            return 444;
        }
    }

    # ── HTTPS: cyberlearnix.com — QR verification page + PayU payment callback passthrough ─
    # Serves /verify.html (student ID card) and PayU callback redirects.
    # All other traffic is handled by the external frontend host (Netlify).
    server {
        listen 443 ssl;
        http2 on;
        server_name cyberlearnix.com www.cyberlearnix.com;
        ssl_certificate     /etc/letsencrypt/live/cyberlearnix.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cyberlearnix.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        client_max_body_size 10M;

        # QR code student verification page — served by user-service static resources
        location = /verify.html {
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
        }

        # Public verification API (called by verify.html)
        location ~* ^/api/public/ {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_connect_timeout 15s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # PayU success / failure browser redirects
        location ~* ^/api/enrollments/payments/callback/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_connect_timeout 15s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # All other requests on this domain are not handled by this nginx
        location / { return 404; }
    }

    # ── HTTPS: Full production API server ─────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name apis.cyberlearnix.com;
        ssl_certificate     /etc/letsencrypt/live/apis.cyberlearnix.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/apis.cyberlearnix.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        limit_conn conn_limit 100;
        client_max_body_size 600M;
        location = /nginx-health { return 200 "OK\n"; }
        location ~* /actuator { return 403; }
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_connect_timeout 15s;
            proxy_read_timeout    600s;
            proxy_send_timeout    600s;
        }
        # Lab WebSocket terminal — bypass gateway, direct to lab-service
        # Gateway's Reactor Netty re-frames binary WebSocket messages causing 1002.
        # lab-service validates the JWT from the ?token= query param directly.
        location /labs/terminal/ {
            proxy_pass         http://lab-service:8090;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 15s;
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }
        location / { return 404; }
    }
}
