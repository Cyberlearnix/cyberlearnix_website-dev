worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # Rate limiting zones
    # API: 30 req/s per IP with burst
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # Auth endpoints: 5 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # Max concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream: Spring Cloud API Gateway
    upstream api_gateway {
        server gateway-service:8080;
        keepalive 32;
    }

    # ── HTTP server ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Max 100 concurrent connections per IP
        limit_conn conn_limit 100;

        # Allow large file uploads (CMS/media service supports up to 50MB)
        client_max_body_size 55M;
        client_body_timeout 60s;
        client_header_timeout 10s;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        # CSP: API-only server — no inline scripts, no embeds, no framing
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none';" always;
        # Disable browser features not needed for an API
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        # Prevent caching of sensitive API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # Nginx internal health probe (bypasses gateway)
        location = /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Block actuator endpoints from reaching the internet
        location ~* /actuator {
            return 403;
        }

        # Auth endpoints: strict rate limit (brute-force protection)
        location ~* ^/api/[^/]+/(login|register|refresh-token|forgot-password|reset-password) {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # All API traffic
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    60s;
        }

        # Block everything else
        location / {
            return 404;
        }
    }

    # ── HTTPS server (uncomment after adding SSL certificate) ────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # ... same location blocks as HTTP server above ...
    # }
    #
    # # Redirect HTTP → HTTPS
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}
