worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream: Spring Cloud API Gateway
    upstream api_gateway {
        server gateway-service:8080;
        keepalive 32;
    }

    # ── Shared location blocks (included in HTTPS server) ────────────────────
    # Defined as a macro via map trick — actual locations live in HTTPS server.

    # ── HTTP: ACME challenge + redirect everything to HTTPS ──────────────────
    server {
        listen 80;
        server_name api.cyberlearnix.com;

        # Let's Encrypt webroot challenge — must be served over HTTP
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTP catch-all: health probe + block direct-IP access ────────────────
    server {
        listen 80 default_server;
        server_name _;

        location = /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 444;
        }
    }

    # ── HTTPS: Full production API server ────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.cyberlearnix.com;

        # SSL certificate (managed by certbot / Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/api.cyberlearnix.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.cyberlearnix.com/privkey.pem;

        # Modern TLS only
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # Session resumption
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout    5s;

        # HSTS — browser will only use HTTPS for 2 years
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Max 100 concurrent connections per IP
        limit_conn conn_limit 100;

        # Allow large file uploads (CMS/media up to 50MB)
        client_max_body_size 55M;
        client_body_timeout 60s;
        client_header_timeout 10s;

        # Security headers — nginx is the authoritative source
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;

        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # Nginx internal health probe (bypasses gateway)
        location = /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Block actuator endpoints from reaching the internet
        location ~* /actuator {
            return 403;
        }

        # Auth endpoints: strict rate limit (brute-force protection)
        location ~* ^/api/[^/]+/(login|register|refresh-token|forgot-password|reset-password) {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # All API traffic
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    60s;
        }

        # Block everything else
        location / {
            return 404;
        }
    }
}
