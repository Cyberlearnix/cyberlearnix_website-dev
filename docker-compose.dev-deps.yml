# Standalone dev-dependencies stack — postgres, redis, redisinsight only.
# Run:  docker compose -f docker-compose.dev-deps.yml up -d
# Stop: docker compose -f docker-compose.dev-deps.yml down
#
# Shares the same cyberlearnix-network and named volumes as the main stack
# so services started later from docker-compose.yml can reach these containers.

services:
  postgres:
    image: postgres:15-alpine
    container_name: cyberlearnix-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5999:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberlearnix-network

  redis:
    image: redis:7-alpine
    container_name: cyberlearnix-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6380:6379"   # 6379 is held by swachvega-redis; use 6380 locally
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} --no-auth-warning ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: cyberlearnix-redisinsight
    ports:
      - "127.0.0.1:5541:5540"   # 5540 is held by Docker Desktop; use 5541 locally
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix_users
      - DB_USER=postgres
      - DB_PASS=${DB_PASS}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GMAIL_USER=${GMAIL_USER:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - CLOUDINARY_UPLOAD_PRESET=${CLOUDINARY_UPLOAD_PRESET:-ml_default}
      - GOOGLE_DRIVE_CREDENTIALS_JSON_B64=${GOOGLE_DRIVE_CREDENTIALS_JSON_B64:-}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  cms-service:
