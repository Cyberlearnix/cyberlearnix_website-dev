spring.application.name=attendance-service
server.port=8092

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5999}/${DB_NAME:cyberlearnix_attendance}?options=-c%20timezone=UTC&timezone=UTC&prepareThreshold=0
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:Cyb3rL3arnix#2026!DB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT Configuration
jwt.secret=${JWT_SECRET:cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}



# Attendance Engine Config
attendance.min-present-percent=80
attendance.min-partial-percent=40
attendance.min-late-join-minutes=10
attendance.certificate-min-percent=80

# Scheduler
attendance.scheduler.enabled=true
attendance.scheduler.finalize-delay-minutes=30

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}

# Inter-service URLs
services.user-service.url=${USER_SERVICE_URL:http://localhost:8081}
services.course-service.url=${COURSE_SERVICE_URL:http://localhost:8082}
services.enrollment-service.url=${ENROLLMENT_SERVICE_URL:http://localhost:8083}
services.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}

# Feign
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=10000

# Swagger / OpenAPI
springdoc.api-docs.path=/api/attendance/v3/api-docs
springdoc.swagger-ui.path=/api/attendance/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Mail
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${GMAIL_USER:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
management.health.mail.enabled=false
