spring.application.name=user-service
server.port=8081

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5999}/${DB_NAME:cyberlearnix_users}?options=-c%20timezone=UTC&timezone=UTC&prepareThreshold=0
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:Cyb3rL3arnix#2026!DB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.refreshSecret=${JWT_REFRESH_SECRET:${JWT_SECRET}}
jwt.expiration=900000
jwt.refreshExpiration=2592000000

# Security Configuration
security.rate-limit.max-attempts=100
security.rate-limit.window-minutes=15

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Public site URL for QR code verification links
app.public-url=${APP_PUBLIC_URL:${FRONTEND_URL:https://cyberlearnix.com}}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.root=INFO
logging.level.com.cyberlearnix=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Mail Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:cyberlearnixprivatelimited@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Resend Configuration
resend.api.key=${RESEND_API_KEY:}

# Multipart / File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dt6rxrpqr}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:ml_default}
cloudinary.api-key=${CLOUDINARY_API_KEY:#{null}}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:#{null}}

# Google Drive Configuration (profile photo uploads)
google.drive.credentials-json-b64=${GOOGLE_DRIVE_CREDENTIALS_JSON_B64:}
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:}
google.drive.client-id=${GOOGLE_DRIVE_CLIENT_ID:}
google.drive.client-secret=${GOOGLE_DRIVE_CLIENT_SECRET:}
google.drive.refresh-token=${GOOGLE_DRIVE_REFRESH_TOKEN:}

# Swagger Configuration
springdoc.api-docs.path=/api/auth/v3/api-docs

# Actuator — Kubernetes probe endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Disable mail health check — SMTP password not set in local dev
management.health.mail.enabled=false

# Security Headers (for nginx reverse proxy)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
