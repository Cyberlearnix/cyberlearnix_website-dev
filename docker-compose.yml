      - DB_PASS=postgres
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  cms-service:
    build:
      context: .
      dockerfile: cms-service/Dockerfile
    container_name: cms-service
    ports:
      - "8089:8089"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix
      - DB_USER=postgres
      - DB_PASS=postgres
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - cyberlearnix-network

networks:
  cyberlearnix-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
