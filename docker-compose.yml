services:
  postgres:
    image: postgres:15-alpine
    container_name: cyberlearnix-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Cyb3rL3arnix#2026!DB
      POSTGRES_DB: postgres
    ports:
      - "5999:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberlearnix-network

  redis:
    image: redis:7-alpine
    container_name: cyberlearnix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: cyberlearnix-redisinsight
    ports:
      - "5540:5540"
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      - USER_SERVICE_URL=http://user-service:8081
      - COURSE_SERVICE_URL=http://course-service:8082
      - ENROLLMENT_SERVICE_URL=http://enrollment-service:8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8084
      - SHOP_SERVICE_URL=http://shop-service:8085
      - FORM_SERVICE_URL=http://form-service:8087
      - CMS_SERVICE_URL=http://cms-service:8089
      - ADMIN_SERVICE_URL=http://admin-service:8090
      - INSTRUCTOR_SERVICE_URL=http://instructor-service:8091
    depends_on:
      redis:
        condition: service_started
      user-service:
        condition: service_started
      course-service:
        condition: service_started
      enrollment-service:
        condition: service_started
      notification-service:
        condition: service_started
      shop-service:
        condition: service_started
      form-service:
        condition: service_started
      admin-service:
        condition: service_started
      cms-service:
        condition: service_started
      instructor-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix_users
      - DB_USER=postgres
      - DB_PASS=Cyb3rL3arnix#2026!DB
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  course-service:
    build:
      context: .
      dockerfile: course-service/Dockerfile
    container_name: course-service
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix_courses
      - DB_USER=postgres
      - DB_PASS=Cyb3rL3arnix#2026!DB
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  enrollment-service:
    build:
      context: .
      dockerfile: enrollment-service/Dockerfile
    container_name: enrollment-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix_enrollments
      - DB_USER=postgres
      - DB_PASS=Cyb3rL3arnix#2026!DB
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
      - USER_SERVICE_URL=http://user-service:8081
      - NOTIFICATION_SERVICE_URL=http://notification-service:8084
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  shop-service:
    build:
      context: .
      dockerfile: shop-service/Dockerfile
    container_name: shop-service
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix_shop
      - DB_USER=postgres
      - DB_PASS=Cyb3rL3arnix#2026!DB
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  form-service:
    build:
      context: .
      dockerfile: form-service/Dockerfile
    container_name: form-service
    ports:
      - "8087:8087"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix_forms
      - DB_USER=postgres
      - DB_PASS=Cyb3rL3arnix#2026!DB
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
      - USER_SERVICE_URL=http://user-service:8081
      - NOTIFICATION_SERVICE_URL=http://notification-service:8084
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    container_name: admin-service
    ports:
      - "8090:8090"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix_admin
      - DB_USER=postgres
      - DB_PASS=Cyb3rL3arnix#2026!DB
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
      - USER_SERVICE_URL=http://user-service:8081
      - COURSE_SERVICE_URL=http://course-service:8082
      - ENROLLMENT_SERVICE_URL=http://enrollment-service:8083
    depends_on:
      - postgres
      - user-service
      - course-service
      - enrollment-service
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  instructor-service:
    build:
      context: .
      dockerfile: instructor-service/Dockerfile
    container_name: instructor-service
    ports:
      - "8091:8091"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix_instructor
      - DB_USER=postgres
      - DB_PASS=Cyb3rL3arnix#2026!DB
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
      - USER_SERVICE_URL=http://user-service:8081
      - COURSE_SERVICE_URL=http://course-service:8082
      - ENROLLMENT_SERVICE_URL=http://enrollment-service:8083
    depends_on:
      - postgres
      - user-service
      - course-service
      - enrollment-service
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  cms-service:
    build:
      context: .
      dockerfile: cms-service/Dockerfile
    container_name: cms-service
    ports:
      - "8089:8089"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cyberlearnix_cms
      - DB_USER=postgres
      - DB_PASS=Cyb3rL3arnix#2026!DB
      - JWT_SECRET=cyberlearnix-secure-and-ultra-long-secret-key-for-jwt-signing-2026-highly-confidential-512-bit-compliant
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  # ── Logging stack ───────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: cyberlearnix-loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  promtail:
    image: grafana/promtail:3.0.0
    container_name: cyberlearnix-promtail
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  # ── Monitoring stack ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: cyberlearnix-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - cyberlearnix-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: cyberlearnix-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=cyberlearnix2026
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/spring-boot-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - cyberlearnix-network

networks:
  cyberlearnix-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
