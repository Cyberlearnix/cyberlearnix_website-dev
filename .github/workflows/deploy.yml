# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml
#
# Cyberlearnix — SSH + Docker Compose deployment pipeline
# No Azure, no Kubernetes, no Helm. Just Docker Hub + SSH.
#
# Flow:
#   1. Detect which services changed   (dorny/paths-filter, same as ci.yml)
#   2. Build changed images            → push to Docker Hub (:latest + :{sha})
#   3. SSH into server                 → update docker-compose.prod.yml with new
#                                        image tags → docker compose pull → up -d
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME   — Docker Hub username
#   DOCKERHUB_TOKEN      — Docker Hub access token  (NOT your password)
#   SSH_HOST             — server IP or hostname
#   SSH_USER             — SSH login username  (e.g. ubuntu)
#   SSH_PRIVATE_KEY      — PEM private key  (contents of ~/.ssh/id_rsa)
#   SSH_PORT             — SSH port  (optional — defaults to 22)
#
# Server-side prerequisites:
#   ~/cyberlearnix/docker-compose.yml  — the base compose file
#   Docker + Docker Compose v2 installed
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy via SSH + Docker Compose

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: 'Force rebuild all services (ignore change detection)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel a deploy that is in flight

permissions:
  contents: read

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Detect which services changed ────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.decide.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Path-based filtering so we only rebuild services that actually changed.
      # shared-lib changes trigger a full rebuild of all services.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared-lib:
              - 'shared-lib/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
            gateway-service:      ['gateway-service/**']
            user-service:         ['user-service/**']
            course-service:       ['course-service/**']
            enrollment-service:   ['enrollment-service/**']
            notification-service: ['notification-service/**']
            shop-service:         ['shop-service/**']
            form-service:         ['form-service/**']
            admin-service:        ['admin-service/**']
            cms-service:          ['cms-service/**']
            instructor-service:   ['instructor-service/**']

      - name: Determine build matrix
        id: decide
        run: |
          ALL='["gateway-service","user-service","course-service","enrollment-service","notification-service","shop-service","form-service","admin-service","cms-service","instructor-service"]'
          FORCE="${{ github.event.inputs.force_rebuild_all }}"
          SHARED="${{ steps.filter.outputs.shared-lib }}"

          if [[ "$FORCE" == "true" || "$SHARED" == "true" ]]; then
            echo "matrix=$ALL" >> $GITHUB_OUTPUT
            echo "Rebuilding ALL services (shared-lib changed or force flag)"
          else
            CHANGED=()
            SERVICES=(gateway-service user-service course-service enrollment-service \
                       notification-service shop-service form-service admin-service \
                       cms-service instructor-service)
            declare -A FILTER_MAP=(
              [gateway-service]="${{ steps.filter.outputs.gateway-service }}"
              [user-service]="${{ steps.filter.outputs.user-service }}"
              [course-service]="${{ steps.filter.outputs.course-service }}"
              [enrollment-service]="${{ steps.filter.outputs.enrollment-service }}"
              [notification-service]="${{ steps.filter.outputs.notification-service }}"
              [shop-service]="${{ steps.filter.outputs.shop-service }}"
              [form-service]="${{ steps.filter.outputs.form-service }}"
              [admin-service]="${{ steps.filter.outputs.admin-service }}"
              [cms-service]="${{ steps.filter.outputs.cms-service }}"
              [instructor-service]="${{ steps.filter.outputs.instructor-service }}"
            )
            for svc in "${SERVICES[@]}"; do
              [[ "${FILTER_MAP[$svc]}" == "true" ]] && CHANGED+=("\"$svc\"")
            done

            if [[ ${#CHANGED[@]} -eq 0 ]]; then
              echo "matrix=[]" >> $GITHUB_OUTPUT
              echo "No service source changes detected — skipping image builds"
            else
              MATRIX="[$(IFS=,; echo "${CHANGED[*]}")]"
              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
              echo "Services to rebuild: $MATRIX"
            fi
          fi

  # ── 1.5 Run tests before building any images ───────────────────────────────
  # Tests run in parallel (one job per changed service, same matrix as build).
  # fail-fast: true means the first test failure aborts all other test jobs,
  # preventing wasted build time when the code is already broken.
  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.matrix != '[]'
    strategy:
      fail-fast: true
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests — ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ matrix.service }}/build/test-results/**/*.xml
          comment_mode: off

      - name: Upload test report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-report-deploy-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/
          retention-days: 7

  # ── 2. Build & push Docker images to Docker Hub ─────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30          # fail fast if a build hangs
    needs: [changes, test]
    if: needs.changes.outputs.matrix != '[]'
    strategy:
      fail-fast: false   # Let other services continue if one fails
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      # Cache Gradle dependency downloads — shaves 2-4 min off every build
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/cyberlearnix-${{ matrix.service }}"
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}"         >> $GITHUB_OUTPUT
          echo "Will push: ${IMAGE}:latest  and  ${IMAGE}:${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build context is the repo root so Gradle multi-project builds resolve
      # shared-lib correctly.  Each service has its own Dockerfile.
      - name: Build and push — ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64   # lock to server arch — prevents manifest mismatch
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short-sha }}
          # Registry-layer cache — reuses unchanged layers across workflow runs
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:cache
          cache-to:   type=registry,ref=${{ steps.meta.outputs.image }}:cache,mode=max
          provenance: false   # Keeps image manifests simple / ACR-compatible

      # Pass the short SHA to the deploy job so it can write exact image tags
      # into docker-compose.prod.yml on the server.
      - name: Save short SHA artifact
        run: |
          mkdir -p /tmp/image-tags
          echo "${{ steps.meta.outputs.short-sha }}" > /tmp/image-tags/${{ matrix.service }}

      - uses: actions/upload-artifact@v4
        with:
          name: image-tag-${{ matrix.service }}
          path: /tmp/image-tags/${{ matrix.service }}
          retention-days: 1

  # ── 3. Deploy to server via SSH ──────────────────────────────────────────────
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20          # docker pull on a slow connection shouldn't block forever
    needs: [changes, test, build-push]
    # Run if builds succeeded OR if nothing was built (no source changes this push).
    # NEVER run if tests failed — a broken test must block the deploy.
    if: |
      always() &&
      needs.test.result != 'failure' &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') &&
      needs.changes.result == 'success'
    steps:
      - uses: actions/checkout@v4

      # Collect the per-service {sha} files written above.
      # continue-on-error because the matrix may have been empty (nothing rebuilt).
      - name: Download image tag artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: image-tag-*
          merge-multiple: true
          path: /tmp/image-tags

      # Build docker-compose.prod.yml with exact image tags:
      #   - rebuilt services  → :{short-sha}
      #   - unchanged services → :latest  (already running on server, no change)
      - name: Generate docker-compose.prod.yml
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          USERNAME="${DOCKERHUB_USERNAME}"

          SERVICES=(
            gateway-service user-service course-service enrollment-service
            notification-service shop-service form-service admin-service
            cms-service instructor-service
          )

          {
            echo "# Auto-generated by GitHub Actions — do not edit by hand."
            echo "# Last deployed commit: ${SHORT_SHA}"
            echo "# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d"
            echo "services:"
            for svc in "${SERVICES[@]}"; do
              if [[ -f "/tmp/image-tags/${svc}" ]]; then
                TAG=$(cat "/tmp/image-tags/${svc}")
                echo "  # rebuilt this run"
              else
                TAG="latest"
              fi
              echo "  ${svc}:"
              echo "    image: ${USERNAME}/cyberlearnix-${svc}:${TAG}"
            done
          } > /tmp/docker-compose.prod.yml

          echo "--- Generated docker-compose.prod.yml ---"
          cat /tmp/docker-compose.prod.yml

      # Add the private key to the SSH agent so scp and ssh below can use it.
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Trust the server's host key so SSH doesn't prompt for confirmation.
      - name: Add server to known_hosts
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          ssh-keyscan -p "${PORT}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # Push the freshly generated override file to the server.
      # Using ssh+cat instead of scp to avoid "message too long" errors
      # caused by shell startup scripts printing output on the server.
      - name: Upload docker-compose.prod.yml to server
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          ssh -p "${PORT}" -o BatchMode=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p ~/cyberlearnix && cat > ~/cyberlearnix/docker-compose.prod.yml" \
            < /tmp/docker-compose.prod.yml

      # Pull new images and do a rolling restart of changed containers.
      # --remove-orphans cleans up containers for services removed from compose.
      # Heredoc is unquoted so $DH_USER/$DH_TOKEN expand on the runner before
      # the script is piped to the server (GitHub Actions masks them in logs).
      - name: Pull images and restart services
        env:
          DH_USER:  ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          ssh -p "${PORT}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -s' << REMOTE_EOF
          set -euo pipefail

          echo "==> Logging into Docker Hub..."
          echo "${DH_TOKEN}" | docker login -u "${DH_USER}" --password-stdin

          cd ~/cyberlearnix

          COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
          SVCS="gateway-service user-service course-service enrollment-service notification-service shop-service form-service admin-service cms-service instructor-service"

          echo "==> Backing up current prod config for rollback if needed..."
          cp ~/cyberlearnix/docker-compose.prod.yml ~/cyberlearnix/docker-compose.prod.yml.bak 2>/dev/null || true

          echo "==> Pulling latest images from Docker Hub..."
          \$COMPOSE pull \$SVCS

          echo "==> Starting services — waiting until all containers pass HEALTHCHECK..."
          # --wait blocks until every container reaches 'healthy' (uses Dockerfile HEALTHCHECK)
          # --wait-timeout is the maximum seconds to wait before declaring failure
          if ! \$COMPOSE up -d --no-build --wait --wait-timeout 120 \$SVCS; then
            echo "ERROR: one or more services failed to become healthy — check logs above"
            \$COMPOSE logs --tail=80 \$SVCS
            echo "==> Rolling back to previous image versions..."
            cp ~/cyberlearnix/docker-compose.prod.yml.bak ~/cyberlearnix/docker-compose.prod.yml 2>/dev/null || true
            \$COMPOSE up -d --no-build \$SVCS
            echo "==> Rollback complete. Previous version is live."
            exit 1
          fi

          echo "==> Removing dangling/unused images to free disk space..."
          docker image prune -f

          echo "==> Running containers:"
          \$COMPOSE ps \$SVCS

          echo "==> Logging out of Docker Hub..."
          docker logout
          REMOTE_EOF

      # Append a summary table to the GitHub Actions job summary page.
      - name: Write deployment summary
        if: always()
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          {
            echo "### Deployment Summary"
            echo "| | |"
            echo "|---|---|"
            echo "| Commit | \`${SHORT_SHA}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Services rebuilt | \`${{ needs.changes.outputs.matrix }}\` |"
            echo "| Server | \`${{ secrets.SSH_HOST }}\` |"
            echo "| Docker Hub | \`${{ secrets.DOCKERHUB_USERNAME }}/cyberlearnix-*\` |"
          } >> $GITHUB_STEP_SUMMARY
