name: Deploy to Production

on:
  push:
    branches: [production]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.squad/**'
      - 'helm/**'
      - 'k8s/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ── 1. Build and push all 12 service images ────────────────────────────────
  build-push:
    name: Docker – ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway-service
          - user-service
          - course-service
          - enrollment-service
          - notification-service
          - shop-service
          - form-service
          - admin-service
          - cms-service
          - instructor-service
          - attendance-service
          - lab-service
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          tags: |
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:prod-latest
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:${{ github.sha }}
          push: true
          cache-from: type=gha,scope=prod-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=prod-${{ matrix.service }}

  # ── 2. Update image tags in values-production.yaml → ArgoCD deploys to cyberlearnix-production ──
  update-production-tags:
    name: Update image tags → production
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: production
          fetch-depth: 0

      - name: Update all image tags in values-production.yaml
        run: |
          SERVICES="gateway-service user-service course-service enrollment-service notification-service shop-service form-service admin-service cms-service instructor-service attendance-service lab-service"
          for svc in $SERVICES; do
            sed -i "s|  ${svc}: \".*\"|  ${svc}: \"${{ github.sha }}\"|g" helm/values-production.yaml
          done

      - name: Commit and push tag update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values-production.yaml
          git diff --staged --quiet || git commit -m "ci(prod): update image tags to ${{ github.sha }}"
          git push origin production

      - name: Trigger ArgoCD sync – production
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://argocd.cyberlearnix.com/argocd/api/v1/applications/cyberlearnix-production/sync \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"prune": true}' | grep -qE '^2' && echo "ArgoCD sync triggered" || echo "ArgoCD sync skipped (token not set or unreachable)"
