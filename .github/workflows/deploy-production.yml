name: Deploy → Production

on:
  push:
    branches: [production]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.squad/**'
      - 'helm/**'
      - 'k8s/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ── 1. Build and push all 12 service images ────────────────────────────────
  build-push:
    name: Docker – ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway-service
          - user-service
          - course-service
          - enrollment-service
          - notification-service
          - shop-service
          - form-service
          - admin-service
          - cms-service
          - instructor-service
          - attendance-service
          - lab-service
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          tags: |
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:prod-latest
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:${{ github.sha }}
          push: true
          cache-from: type=gha,scope=prod-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=prod-${{ matrix.service }}

  # ── 2. Deploy all services to cyberlearnix-production namespace ────────────
  deploy:
    name: Deploy → www.cyberlearnix.com
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy all services via SSH
        env:
          GIT_SHA: ${{ github.sha }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SERVICES="gateway-service user-service course-service enrollment-service notification-service shop-service form-service admin-service cms-service instructor-service attendance-service lab-service"
          REGISTRY="ghcr.io/cyberlearnix"

          for svc in $SERVICES; do
            IMAGE="${REGISTRY}/cyberlearnix-${svc}:${GIT_SHA}"
            echo "Deploying $svc → $IMAGE"
            ssh -i ~/.ssh/id_deploy -p "$SERVER_PORT" \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "root@${SERVER_HOST}" \
              "kubectl set image deployment/${svc} ${svc}=${IMAGE} -n cyberlearnix-production && \
               kubectl rollout status deployment/${svc} -n cyberlearnix-production --timeout=300s"
          done

          rm -f ~/.ssh/id_deploy
          echo "All services deployed successfully to production"
