# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/k3s-initial-setup.yml
#
# One-time K3s setup triggered from GitHub Actions UI (no manual SSH needed).
#
# Run this ONCE to bootstrap K3s on the VM.
# After this, helm-deploy.yml handles all subsequent deployments automatically.
#
# How to run:
#   GitHub → Actions → "K3s Initial Setup" → Run workflow → fill inputs → Run
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST             — VM IP (20.197.21.226)
#   SSH_USER             — swachvegadev
#   SSH_PRIVATE_KEY      — PEM private key
#   SSH_PORT             — (optional, defaults to 22)
#   DOCKERHUB_USERNAME   — Docker Hub username
#   DOCKERHUB_TOKEN      — Docker Hub access token
#   DB_PASSWORD          — Postgres root password (add this if not already added)
#   JWT_SECRET           — JWT signing secret     (add this if not already added)
#
# Optional GitHub Secret:
#   REDIS_PASSWORD       — Redis AUTH password (leave blank if Redis has no auth)
# ──────────────────────────────────────────────────────────────────────────────

name: K3s Initial Setup

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "setup" to confirm running the one-time K3s bootstrap'
        required: true
        default: ''
      force_reinstall:
        description: 'Force reinstall even if K3s is already running'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

jobs:
  setup:
    name: Bootstrap K3s on VM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "setup" ]]; then
            echo "::error::Confirmation input must be exactly 'setup'. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "Confirmation accepted — proceeding with K3s setup"

      - uses: actions/checkout@v4

      - name: Verify required secrets are present
        run: |
          MISSING=()
          [[ -z "${{ secrets.SSH_HOST }}"           ]] && MISSING+=("SSH_HOST")
          [[ -z "${{ secrets.SSH_USER }}"           ]] && MISSING+=("SSH_USER")
          [[ -z "${{ secrets.SSH_PRIVATE_KEY }}"    ]] && MISSING+=("SSH_PRIVATE_KEY")
          [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]] && MISSING+=("DOCKERHUB_USERNAME")
          [[ -z "${{ secrets.DOCKERHUB_TOKEN }}"    ]] && MISSING+=("DOCKERHUB_TOKEN")
          [[ -z "${{ secrets.DB_PASSWORD }}"        ]] && MISSING+=("DB_PASSWORD")
          [[ -z "${{ secrets.JWT_SECRET }}"         ]] && MISSING+=("JWT_SECRET")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing GitHub Secrets: ${MISSING[*]}"
            echo "Add them at: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "All required secrets are present"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          ssh-keyscan -p "${PORT}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Run k3s-setup.sh on VM
        env:
          DH_USER:        ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN:       ${{ secrets.DOCKERHUB_TOKEN }}
          DB_PASS:        ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:     ${{ secrets.JWT_SECRET }}
          REDIS_PASS:     ${{ secrets.REDIS_PASSWORD }}
          FORCE:          ${{ github.event.inputs.force_reinstall }}
          GITHUB_REPO:    ${{ github.repository }}
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"

          # Copy setup script to VM and run it with injected env vars
          scp -P "${PORT}" scripts/k3s-setup.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/k3s-setup.sh"

          ssh -p "${PORT}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash << REMOTE
          set -euo pipefail
          export DOCKERHUB_USERNAME="${DH_USER}"
          export DOCKERHUB_TOKEN="${DH_TOKEN}"
          export DB_PASSWORD="${DB_PASS}"
          export JWT_SECRET="${JWT_SECRET}"
          export REDIS_PASSWORD="${REDIS_PASS}"
          export GITHUB_REPO="${GITHUB_REPO}"

          # If force reinstall, remove k3s first
          if [[ "${FORCE}" == "true" ]] && command -v k3s-uninstall.sh &>/dev/null; then
            echo "==> Force reinstall: removing existing K3s..."
            k3s-uninstall.sh || true
          fi

          chmod +x ~/k3s-setup.sh
          ~/k3s-setup.sh

          # Cleanup script file (contains no secrets, but good hygiene)
          rm -f ~/k3s-setup.sh
          REMOTE

      - name: Verify K3s is running
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          ssh -p "${PORT}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'export KUBECONFIG=$HOME/.kube/config; kubectl get nodes; kubectl get pods -n cyberlearnix'

      - name: Setup summary
        if: success()
        run: |
          echo "## K3s Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| VM | ${{ secrets.SSH_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`cyberlearnix\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | http://${{ secrets.SSH_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Next step | Push any code change to main → \`helm-deploy.yml\` runs automatically |" >> $GITHUB_STEP_SUMMARY

      - name: Setup failed
        if: failure()
        run: |
          echo "## K3s Setup Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the step logs above for the error." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Common issues:**" >> $GITHUB_STEP_SUMMARY
          echo "- Missing GitHub secrets (DB_PASSWORD, JWT_SECRET)" >> $GITHUB_STEP_SUMMARY
          echo "- SSH key not authorized on VM" >> $GITHUB_STEP_SUMMARY
          echo "- VM firewall blocking port 22" >> $GITHUB_STEP_SUMMARY
