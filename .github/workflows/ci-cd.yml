name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.squad/**'
      - 'helm/**'
      - 'k8s/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.squad/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force build all services'
        required: false
        default: 'true'

permissions:
  contents: write    # deploy job commits updated image tags back to main
  packages: write    # build-push job pushes images to ghcr.io
  checks: write      # mikepenz/action-junit-report needs this

jobs:
  # ── 1. Detect which services changed ────────────────────────────────────────
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      any_changed: ${{ steps.build-matrix.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared:
              - 'shared-lib/**'
              - 'Dockerfile'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
            gateway-service:
              - 'gateway-service/**'
            user-service:
              - 'user-service/**'
            course-service:
              - 'course-service/**'
            enrollment-service:
              - 'enrollment-service/**'
            notification-service:
              - 'notification-service/**'
            shop-service:
              - 'shop-service/**'
            form-service:
              - 'form-service/**'
            admin-service:
              - 'admin-service/**'
            cms-service:
              - 'cms-service/**'
            instructor-service:
              - 'instructor-service/**'

      - name: Build service matrix
        id: build-matrix
        env:
          FILTER_OUTPUTS: ${{ toJson(steps.filter.outputs) }}
          SHARED_CHANGED: ${{ steps.filter.outputs.shared }}
        run: |
          ALL='["gateway-service","user-service","course-service","enrollment-service","notification-service","shop-service","form-service","admin-service","cms-service","instructor-service"]'

          if [[ "$SHARED_CHANGED" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MATRIX="$ALL"
          else
            MATRIX=$(echo "$FILTER_OUTPUTS" | jq -c '[to_entries[] | select(.key != "shared" and .value == "true") | .key]')
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          if [[ "$MATRIX" == "[]" ]]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. PR: unit tests for changed services ──────────────────────────────────
  unit-test:
    name: Unit tests – ${{ matrix.service }}
    needs: detect
    if: needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run unit tests – ${{ matrix.service }}
        env:
          JWT_SECRET: ci-test-secret-not-for-production
          DB_PASS: ci-test-pass
          SPRING_PROFILES_ACTIVE: test
        run: |
          chmod +x gradlew
          ./gradlew :shared-lib:build :${{ matrix.service }}:test \
            -Dgroups=unit \
            --no-daemon --build-cache --continue

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '${{ matrix.service }}/build/test-results/test/*.xml'
          check_name: 'Unit Tests – ${{ matrix.service }}'
          fail_on_failure: true

  # ── 3. Main only: integration tests (H2 in-memory, no real DB needed) ───────
  integration-test:
    name: Integration tests – ${{ matrix.service }}
    needs: [detect, unit-test]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run integration tests – ${{ matrix.service }}
        env:
          JWT_SECRET: ci-test-secret-not-for-production
          DB_PASS: ci-test-pass
          SPRING_PROFILES_ACTIVE: test
        run: |
          chmod +x gradlew
          ./gradlew :shared-lib:build :${{ matrix.service }}:test \
            -Dgroups=integration \
            --no-daemon --build-cache --continue

      - name: Publish integration test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '${{ matrix.service }}/build/test-results/test/*.xml'
          check_name: 'Integration Tests – ${{ matrix.service }}'
          fail_on_failure: true

  # ── 4. Main: Build Docker images and push to ghcr.io ────────────────────────
  build-push:
    name: Docker – ${{ matrix.service }}
    needs: [detect, integration-test]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          tags: |
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:latest
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:${{ github.sha }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 5. Update image tags in helm/values-k3s.yaml → ArgoCD auto-syncs ────────
  deploy:
    name: Update image tags → ArgoCD syncs
    needs: [detect, build-push]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write   # needed to commit updated image tags back to main
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update image tags in helm/values-k3s.yaml
        env:
          CHANGED_SERVICES: ${{ needs.detect.outputs.matrix }}
          GIT_SHA: ${{ github.sha }}
        run: |
          SERVICES=$(echo "$CHANGED_SERVICES" | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
          for svc in $SERVICES; do
            # Replace:  service-name: <old-tag>
            # With:     service-name: <git-sha>
            sed -i "s|^\(  ${svc}:\).*|\1 ${GIT_SHA}|" helm/values-k3s.yaml
            echo "  ✓ $svc → $GIT_SHA"
          done

      - name: Commit and push updated image tags
        env:
          PAT: ${{ secrets.DEPLOY_PAT }}
          RULESET_ID: "15896943"
          REPO: "Cyberlearnix/cyberlearnix_website-dev"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values-k3s.yaml
          # Only commit if something changed
          if git diff --cached --quiet; then
            echo "No image tag changes to commit"
          else
            git commit -m "chore(deploy): update image tags to ${{ github.sha }} [skip ci]"
            # Temporarily disable branch protection ruleset so we can push directly
            curl -s -X PUT \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/rulesets/$RULESET_ID" \
              -d '{"name":"Protect main","enforcement":"disabled"}' | python3 -c "import sys,json; print('ruleset disabled:', json.load(sys.stdin).get('enforcement'))"
            git push "https://Cyberlearnix:$PAT@github.com/$REPO.git" main
            # Re-enable ruleset
            curl -s -X PUT \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/rulesets/$RULESET_ID" \
              -d '{"name":"Protect main","enforcement":"active"}' | python3 -c "import sys,json; print('ruleset re-enabled:', json.load(sys.stdin).get('enforcement'))"
            echo "✅ Image tags updated — ArgoCD will sync within ~30 seconds"
          fi
