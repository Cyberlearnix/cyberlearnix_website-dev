name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.squad/**'
      - 'helm/**'
      - 'k8s/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.squad/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force build all services'
        required: false
        default: 'true'

permissions:
  contents: write    # deploy job commits updated image tags back to main
  packages: write    # build-push job pushes images to ghcr.io
  checks: write      # mikepenz/action-junit-report needs this

jobs:
  # ── 1. Detect which services changed ────────────────────────────────────────
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      any_changed: ${{ steps.build-matrix.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared:
              - 'shared-lib/**'
              - 'Dockerfile'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
            gateway-service:
              - 'gateway-service/**'
            user-service:
              - 'user-service/**'
            course-service:
              - 'course-service/**'
            enrollment-service:
              - 'enrollment-service/**'
            notification-service:
              - 'notification-service/**'
            shop-service:
              - 'shop-service/**'
            form-service:
              - 'form-service/**'
            admin-service:
              - 'admin-service/**'
            cms-service:
              - 'cms-service/**'
            instructor-service:
              - 'instructor-service/**'
            attendance-service:
              - 'attendance-service/**'
            lab-service:
              - 'lab-service/**'

      - name: Build service matrix
        id: build-matrix
        env:
          FILTER_OUTPUTS: ${{ toJson(steps.filter.outputs) }}
          SHARED_CHANGED: ${{ steps.filter.outputs.shared }}
        run: |
          ALL='["gateway-service","user-service","course-service","enrollment-service","notification-service","shop-service","form-service","admin-service","cms-service","instructor-service","attendance-service","lab-service"]'

          if [[ "$SHARED_CHANGED" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MATRIX="$ALL"
          else
            MATRIX=$(echo "$FILTER_OUTPUTS" | jq -c '[to_entries[] | select(.key != "shared" and .value == "true") | .key]')
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          if [[ "$MATRIX" == "[]" ]]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. PR: unit tests for changed services ──────────────────────────────────
  unit-test:
    name: Unit tests – ${{ matrix.service }}
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway-service
          - user-service
          - course-service
          - enrollment-service
          - notification-service
          - shop-service
          - form-service
          - admin-service
          - cms-service
          - instructor-service
          - attendance-service
          - lab-service
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
        if: contains(fromJson(needs.detect.outputs.matrix), matrix.service)

      - uses: actions/setup-java@v5
        if: contains(fromJson(needs.detect.outputs.matrix), matrix.service)
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run unit tests – ${{ matrix.service }}
        if: contains(fromJson(needs.detect.outputs.matrix), matrix.service)
        env:
          JWT_SECRET: ci-test-secret-not-for-production
          DB_PASS: ci-test-pass
          SPRING_PROFILES_ACTIVE: test
        run: |
          chmod +x gradlew
          ./gradlew :shared-lib:build :${{ matrix.service }}:test \
            -Dgroups=unit \
            --no-daemon --build-cache --continue

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always() && contains(fromJson(needs.detect.outputs.matrix), matrix.service)
        with:
          report_paths: '${{ matrix.service }}/build/test-results/test/*.xml'
          check_name: 'Unit Tests – ${{ matrix.service }}'
          fail_on_failure: true

  # ── 3. Main only: integration tests (H2 in-memory, no real DB needed) ───────
  integration-test:
    name: Integration tests – ${{ matrix.service }}
    needs: [detect, unit-test]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run integration tests – ${{ matrix.service }}
        env:
          JWT_SECRET: ci-test-secret-not-for-production
          DB_PASS: ci-test-pass
          SPRING_PROFILES_ACTIVE: test
        run: |
          chmod +x gradlew
          ./gradlew :shared-lib:build :${{ matrix.service }}:test \
            -Dgroups=integration \
            --no-daemon --build-cache --continue

      - name: Publish integration test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '${{ matrix.service }}/build/test-results/test/*.xml'
          check_name: 'Integration Tests – ${{ matrix.service }}'
          fail_on_failure: true

  # ── 4. Main: Build Docker images and push to ghcr.io ────────────────────────
  build-push:
    name: Docker – ${{ matrix.service }}
    needs: [detect, integration-test]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          tags: |
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:latest
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:${{ github.sha }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 5. Deploy to K3s via SSH (port 6443 is firewalled; SSH on 9022 is open) ──
  deploy:
    name: Deploy → K3s
    needs: [detect, build-push]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy changed services via SSH
        env:
          CHANGED_SERVICES: ${{ needs.detect.outputs.matrix }}
          GIT_SHA: ${{ github.sha }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          K3S_NAMESPACE: ${{ secrets.K3S_NAMESPACE }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SERVICES=$(echo "$CHANGED_SERVICES" | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
          REGISTRY="ghcr.io/cyberlearnix"

          for svc in $SERVICES; do
            IMAGE="${REGISTRY}/cyberlearnix-${svc}:${GIT_SHA}"
            echo "🚀 Deploying $svc → $IMAGE"
            ssh -i ~/.ssh/id_deploy -p "$SERVER_PORT" \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "root@${SERVER_HOST}" \
              "kubectl set image deployment/${svc} ${svc}=${IMAGE} -n ${K3S_NAMESPACE} && \
               kubectl rollout status deployment/${svc} -n ${K3S_NAMESPACE} --timeout=300s"
          done

          rm -f ~/.ssh/id_deploy
          echo "✅ All services deployed successfully"
