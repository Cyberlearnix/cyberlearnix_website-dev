name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.squad/**'
      - 'helm/**'
      - 'k8s/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.squad/**'

permissions:
  contents: read
  packages: write

jobs:
  # ── 1. Detect which services changed ────────────────────────────────────────
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      any_changed: ${{ steps.build-matrix.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'shared-lib/**'
              - 'Dockerfile'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
            gateway-service:
              - 'gateway-service/**'
            user-service:
              - 'user-service/**'
            course-service:
              - 'course-service/**'
            enrollment-service:
              - 'enrollment-service/**'
            notification-service:
              - 'notification-service/**'
            shop-service:
              - 'shop-service/**'
            form-service:
              - 'form-service/**'
            admin-service:
              - 'admin-service/**'
            cms-service:
              - 'cms-service/**'
            instructor-service:
              - 'instructor-service/**'

      - name: Build service matrix
        id: build-matrix
        env:
          FILTER_OUTPUTS: ${{ toJson(steps.filter.outputs) }}
          SHARED_CHANGED: ${{ steps.filter.outputs.shared }}
        run: |
          ALL='["gateway-service","user-service","course-service","enrollment-service","notification-service","shop-service","form-service","admin-service","cms-service","instructor-service"]'

          if [[ "$SHARED_CHANGED" == "true" ]]; then
            MATRIX="$ALL"
          else
            MATRIX=$(echo "$FILTER_OUTPUTS" | jq -c '[to_entries[] | select(.key != "shared" and .value == "true") | .key]')
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          if [[ "$MATRIX" == "[]" ]]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. PR: fast Gradle compile check (no Docker) ────────────────────────────
  build-check:
    name: Compile – ${{ matrix.service }}
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Compile ${{ matrix.service }}
        run: |
          ./gradlew :shared-lib:build :${{ matrix.service }}:bootJar \
            -x test --no-daemon --build-cache --quiet

  # ── 3. Main: Build Docker images and push to ghcr.io ────────────────────────
  build-push:
    name: Docker – ${{ matrix.service }}
    needs: detect
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: |
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:latest
            ghcr.io/cyberlearnix/cyberlearnix-${{ matrix.service }}:${{ github.sha }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 4. Deploy to production server ──────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: [detect, build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          CHANGED_SERVICES: ${{ needs.detect.outputs.matrix }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,CHANGED_SERVICES
          script: |
            set -e
            cd ~/cyberlearnix

            # Auth with ghcr.io
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Pull updated images for changed services only
            SERVICES=$(echo "$CHANGED_SERVICES" | jq -r '.[]' | tr '\n' ' ')
            for svc in $SERVICES; do
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull $svc
            done

            # Rolling restart — only changed services, no downtime on others
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps $SERVICES

            # Wait and verify health
            sleep 15
            for svc in $SERVICES; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$svc" 2>/dev/null || echo "running")
              echo "✓ $svc: $STATUS"
            done

            # Cleanup old images
            docker logout ghcr.io
            docker image prune -f --filter "until=24h"
