# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/helm-deploy.yml
#
# Cyberlearnix — K3s Helm deployment pipeline (no Azure, SSH-only)
#
# Architecture:
#   • K3s runs on the existing VM (20.197.21.226) — installed by k3s-setup.sh
#   • Docker Compose (deploy.yml) manages: Postgres, Redis, observability stack
#   • THIS workflow manages: the 10 Spring Boot microservices via Helm
#
# Flow:
#   1. Detect which services changed
#   2. Build & push Docker images to Docker Hub (SHA + latest tags)
#   3. SSH to VM → git pull → helm upgrade --install (rolling update, no downtime)
#
# Required GitHub Secrets (same as deploy.yml + these):
#   DOCKERHUB_USERNAME   — Docker Hub username
#   DOCKERHUB_TOKEN      — Docker Hub access token
#   SSH_HOST             — VM IP (20.197.21.226)
#   SSH_USER             — swachvegadev
#   SSH_PRIVATE_KEY      — PEM private key
#   SSH_PORT             — (optional, defaults to 22)
#
# One-time prerequisite: run scripts/k3s-setup.sh on the VM first.
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to K3s (Helm)

on:
  push:
    branches: [main]
    paths:
      # Only trigger when service code or helm chart changes
      - 'gateway-service/**'
      - 'user-service/**'
      - 'course-service/**'
      - 'enrollment-service/**'
      - 'notification-service/**'
      - 'shop-service/**'
      - 'form-service/**'
      - 'admin-service/**'
      - 'cms-service/**'
      - 'instructor-service/**'
      - 'shared-lib/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'helm/**'
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: 'Force rebuild all services'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: helm-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Detect which services changed ────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.decide.outputs.matrix }}
      helm_only: ${{ steps.decide.outputs.helm_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared-lib:
              - 'shared-lib/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
            helm-only:
              - 'helm/**'
            gateway-service:      ['gateway-service/**']
            user-service:         ['user-service/**']
            course-service:       ['course-service/**']
            enrollment-service:   ['enrollment-service/**']
            notification-service: ['notification-service/**']
            shop-service:         ['shop-service/**']
            form-service:         ['form-service/**']
            admin-service:        ['admin-service/**']
            cms-service:          ['cms-service/**']
            instructor-service:   ['instructor-service/**']

      - name: Determine build matrix
        id: decide
        run: |
          ALL='["gateway-service","user-service","course-service","enrollment-service","notification-service","shop-service","form-service","admin-service","cms-service","instructor-service"]'
          FORCE="${{ github.event.inputs.force_rebuild_all }}"
          SHARED="${{ steps.filter.outputs.shared-lib }}"
          HELM_ONLY="${{ steps.filter.outputs.helm-only }}"

          # Pure helm change — no image rebuilds needed, just re-deploy
          if [[ "$FORCE" != "true" && "$SHARED" != "true" && "$HELM_ONLY" == "true" ]]; then
            echo 'matrix=[]' >> $GITHUB_OUTPUT
            echo 'helm_only=true' >> $GITHUB_OUTPUT
            echo "Helm-only change — skipping image builds, will re-deploy"
            exit 0
          fi

          echo 'helm_only=false' >> $GITHUB_OUTPUT

          if [[ "$FORCE" == "true" || "$SHARED" == "true" ]]; then
            echo "matrix=$ALL" >> $GITHUB_OUTPUT
            echo "Rebuilding ALL services"
          else
            CHANGED=()
            declare -A FILTER_MAP=(
              [gateway-service]="${{ steps.filter.outputs.gateway-service }}"
              [user-service]="${{ steps.filter.outputs.user-service }}"
              [course-service]="${{ steps.filter.outputs.course-service }}"
              [enrollment-service]="${{ steps.filter.outputs.enrollment-service }}"
              [notification-service]="${{ steps.filter.outputs.notification-service }}"
              [shop-service]="${{ steps.filter.outputs.shop-service }}"
              [form-service]="${{ steps.filter.outputs.form-service }}"
              [admin-service]="${{ steps.filter.outputs.admin-service }}"
              [cms-service]="${{ steps.filter.outputs.cms-service }}"
              [instructor-service]="${{ steps.filter.outputs.instructor-service }}"
            )
            for svc in "${!FILTER_MAP[@]}"; do
              [[ "${FILTER_MAP[$svc]}" == "true" ]] && CHANGED+=("\"$svc\"")
            done
            if [[ ${#CHANGED[@]} -eq 0 ]]; then
              echo 'matrix=[]' >> $GITHUB_OUTPUT
            else
              echo "matrix=[$(IFS=,; echo "${CHANGED[*]}")]" >> $GITHUB_OUTPUT
            fi
          fi

  # ── 2. Build & push Docker images ────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.matrix != '[]' && needs.changes.outputs.helm_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/cyberlearnix-${{ matrix.service }}"
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}"         >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short-sha }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:cache
          cache-to:   type=registry,ref=${{ steps.meta.outputs.image }}:cache,mode=max
          provenance: false

      - name: Save short SHA artifact
        run: |
          mkdir -p /tmp/image-tags
          echo "${{ steps.meta.outputs.short-sha }}" > /tmp/image-tags/${{ matrix.service }}

      - uses: actions/upload-artifact@v7
        with:
          name: k3s-image-tag-${{ matrix.service }}
          path: /tmp/image-tags/${{ matrix.service }}
          retention-days: 1

  # ── 3. Helm upgrade via SSH ──────────────────────────────────────────────────
  helm-deploy:
    name: Helm Upgrade via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, build-push]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Download image tag artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: k3s-image-tag-*
          merge-multiple: true
          path: /tmp/image-tags

      - name: Build --set args for Helm
        id: helm-sets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          SERVICES=(
            gateway-service user-service course-service enrollment-service
            notification-service shop-service form-service admin-service
            cms-service instructor-service
          )
          SETS="--set global.registry=${DOCKERHUB_USERNAME}"
          for svc in "${SERVICES[@]}"; do
            if [[ -f "/tmp/image-tags/${svc}" ]]; then
              TAG=$(cat "/tmp/image-tags/${svc}")
            else
              TAG="latest"
            fi
            SETS="${SETS} --set images.${svc}=${TAG}"
          done
          echo "sets=${SETS}" >> $GITHUB_OUTPUT
          echo "Helm --set args: ${SETS}"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          ssh-keyscan -p "${PORT}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via Helm
        env:
          HELM_SETS: ${{ steps.helm-sets.outputs.sets }}
          DH_USER:   ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN:  ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          COMMIT="${GITHUB_SHA::8}"

          ssh -p "${PORT}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -s' << REMOTE_EOF
          set -euo pipefail
          export KUBECONFIG="\$HOME/.kube/config"

          echo "==> Pulling latest repo (helm chart changes)..."
          git -C ~/cyberlearnix pull --ff-only

          echo "==> Detecting VM private IP for pod→DB connectivity..."
          HOST_IP=\$(ip route get 1.1.1.1 2>/dev/null | awk 'NR==1{print \$7}')
          echo "    Host IP: \$HOST_IP"

          echo "==> Logging into Docker Hub (to pull new images)..."
          echo "${DH_TOKEN}" | docker login -u "${DH_USER}" --password-stdin

          echo "==> Running helm upgrade --install (commit: ${COMMIT})..."
          helm upgrade --install cyberlearnix ~/cyberlearnix/helm \
            -f ~/cyberlearnix/helm/values-k3s.yaml \
            ${HELM_SETS} \
            --set appConfig.DB_HOST="\$HOST_IP" \
            --set appConfig.REDIS_HOST="\$HOST_IP" \
            --set "global.deployCommit=${COMMIT}" \
            --namespace cyberlearnix \
            --create-namespace \
            --timeout 8m \
            --wait \
            --atomic

          echo "==> Deployment complete! Pod status:"
          kubectl get pods -n cyberlearnix

          echo "==> Verifying gateway health..."
          sleep 5
          if kubectl wait --for=condition=ready pod \
               -l app.kubernetes.io/name=gateway-service \
               -n cyberlearnix \
               --timeout=120s; then
            echo "    ✓ Gateway service is healthy"
          else
            echo "    ✗ Gateway pods not ready — check: kubectl describe pods -n cyberlearnix"
            exit 1
          fi

          echo "==> Logging out of Docker Hub..."
          docker logout
          REMOTE_EOF

      - name: Deployment summary
        if: success()
        run: |
          echo "## K3s Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA::8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`cyberlearnix\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | http://${{ secrets.SSH_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Method | Helm upgrade (rolling, --atomic) |" >> $GITHUB_STEP_SUMMARY

      - name: Rollback notification
        if: failure()
        run: |
          echo "## ⚠ Helm Deploy Failed — Auto-Rolled Back" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "--atomic automatically rolled back to the previous release." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Debug: \`kubectl describe pods -n cyberlearnix\`" >> $GITHUB_STEP_SUMMARY
          echo "Logs: \`kubectl logs -l app.kubernetes.io/part-of=cyberlearnix -n cyberlearnix --tail=50\`" >> $GITHUB_STEP_SUMMARY
