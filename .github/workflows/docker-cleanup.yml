# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/docker-cleanup.yml
#
# Removes stale SHA image tags from Docker Hub every Sunday at 03:00 UTC.
# Always keeps: :latest and the 5 most recently pushed SHA tags per service.
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN  (same as deploy.yml)
# ──────────────────────────────────────────────────────────────────────────────

name: Docker Hub — Clean stale tags

on:
  schedule:
    - cron: '0 3 * * 0'   # every Sunday 03:00 UTC
  workflow_dispatch:       # allow manual trigger from Actions tab

permissions:
  contents: none           # this workflow never touches the repo

jobs:
  cleanup:
    name: Remove old image tags
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Delete stale SHA tags (keep latest + last 5 per service)
        env:
          DH_USER:  ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          KEEP_COUNT=5   # number of most-recent SHA tags to retain per image

          SERVICES=(
            gateway-service user-service course-service enrollment-service
            notification-service shop-service form-service admin-service
            cms-service instructor-service
          )

          # Obtain a short-lived Docker Hub JWT (valid ~5 min)
          echo "Authenticating with Docker Hub..."
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DH_USER}\",\"password\":\"${DH_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          if [[ -z "${TOKEN}" || "${TOKEN}" == "null" ]]; then
            echo "ERROR: Docker Hub authentication failed"
            exit 1
          fi

          DELETED_TOTAL=0

          for svc in "${SERVICES[@]}"; do
            IMAGE="${DH_USER}/cyberlearnix-${svc}"
            echo ""
            echo "=== ${IMAGE} ==="

            # Fetch up to 100 tags with their last_updated timestamps
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${IMAGE}/tags?page_size=100&ordering=last_updated")

            # SHA tags are exactly 8 lowercase hex characters
            # Sort descending by last_updated (already returned that way by ordering=last_updated)
            SHA_TAGS=$(echo "${RESPONSE}" | \
              jq -r '.results[] | select(.name | test("^[0-9a-f]{8}$")) | .name')

            TOTAL=$(echo "${SHA_TAGS}" | grep -c . 2>/dev/null || echo 0)
            echo "  Found ${TOTAL} SHA tags"

            if [[ ${TOTAL} -le ${KEEP_COUNT} ]]; then
              echo "  Nothing to delete (at or under keep threshold of ${KEEP_COUNT})"
              continue
            fi

            # Skip the first KEEP_COUNT (most recent), delete the rest
            TO_DELETE=$(echo "${SHA_TAGS}" | tail -n +$((KEEP_COUNT + 1)))
            DELETE_COUNT=$(echo "${TO_DELETE}" | grep -c . 2>/dev/null || echo 0)
            echo "  Deleting ${DELETE_COUNT} old tags..."

            while IFS= read -r tag; do
              [[ -z "${tag}" ]] && continue
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer ${TOKEN}" \
                "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${tag}/")
              if [[ "${HTTP_STATUS}" == "204" ]]; then
                echo "    ✓ deleted :${tag}"
                DELETED_TOTAL=$((DELETED_TOTAL + 1))
              else
                echo "    ✗ :${tag} — HTTP ${HTTP_STATUS} (non-fatal, continuing)"
              fi
            done <<< "${TO_DELETE}"
          done

          echo ""
          echo "Done. Total tags deleted: ${DELETED_TOTAL}"
