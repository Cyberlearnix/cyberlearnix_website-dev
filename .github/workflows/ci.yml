name: CI — Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which services changed ──────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      shared-lib:      ${{ steps.filter.outputs.shared-lib }}
      gateway:         ${{ steps.filter.outputs.gateway-service }}
      user:            ${{ steps.filter.outputs.user-service }}
      course:          ${{ steps.filter.outputs.course-service }}
      enrollment:      ${{ steps.filter.outputs.enrollment-service }}
      notification:    ${{ steps.filter.outputs.notification-service }}
      shop:            ${{ steps.filter.outputs.shop-service }}
      form:            ${{ steps.filter.outputs.form-service }}
      admin:           ${{ steps.filter.outputs.admin-service }}
      cms:             ${{ steps.filter.outputs.cms-service }}
      instructor:      ${{ steps.filter.outputs.instructor-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared-lib:
              - 'shared-lib/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
            gateway-service:
              - 'gateway-service/**'
            user-service:
              - 'user-service/**'
            course-service:
              - 'course-service/**'
            enrollment-service:
              - 'enrollment-service/**'
            notification-service:
              - 'notification-service/**'
            shop-service:
              - 'shop-service/**'
            form-service:
              - 'form-service/**'
            admin-service:
              - 'admin-service/**'
            cms-service:
              - 'cms-service/**'
            instructor-service:
              - 'instructor-service/**'

  # ── Compile & test (smart matrix — only changed services) ──────────────────
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway-service
            changed: ${{ needs.changes.outputs.gateway }}
          - service: user-service
            changed: ${{ needs.changes.outputs.user }}
          - service: course-service
            changed: ${{ needs.changes.outputs.course }}
          - service: enrollment-service
            changed: ${{ needs.changes.outputs.enrollment }}
          - service: notification-service
            changed: ${{ needs.changes.outputs.notification }}
          - service: shop-service
            changed: ${{ needs.changes.outputs.shop }}
          - service: form-service
            changed: ${{ needs.changes.outputs.form }}
          - service: admin-service
            changed: ${{ needs.changes.outputs.admin }}
          - service: cms-service
            changed: ${{ needs.changes.outputs.cms }}
          - service: instructor-service
            changed: ${{ needs.changes.outputs.instructor }}
    # Run if this service changed OR if shared-lib changed (all affected)
    if: |
      matrix.changed == 'true' ||
      needs.changes.outputs.shared-lib == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:build --no-daemon -x test
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Run unit tests — ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:test --no-daemon -Dspring.profiles.active=test -Djunit.platform.tag.include.pattern=unit

      - name: Run integration tests — ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:test --no-daemon -Dspring.profiles.active=test -Djunit.platform.tag.include.pattern=integration
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ matrix.service }}/build/test-results/**/*.xml
          check_name: "Tests — ${{ matrix.service }}"

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-report-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/

  # ── Dockerfile lint ────────────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ── Final gate — all must pass ─────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build, dockerfile-lint]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build.result }}" == "failure" || \
                "${{ needs.dockerfile-lint.result }}" == "failure" ]]; then
            echo "❌ CI gate failed"
            exit 1
          fi
          echo "✅ CI gate passed"
