name: CI — Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  checks: write        # required by publish-unit-test-result-action to create check runs
  pull-requests: write # required by publish-unit-test-result-action to comment on PRs

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which services changed ──────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      shared-lib:      ${{ steps.filter.outputs.shared-lib }}
      gateway:         ${{ steps.filter.outputs.gateway-service }}
      user:            ${{ steps.filter.outputs.user-service }}
      course:          ${{ steps.filter.outputs.course-service }}
      enrollment:      ${{ steps.filter.outputs.enrollment-service }}
      notification:    ${{ steps.filter.outputs.notification-service }}
      shop:            ${{ steps.filter.outputs.shop-service }}
      form:            ${{ steps.filter.outputs.form-service }}
      admin:           ${{ steps.filter.outputs.admin-service }}
      cms:             ${{ steps.filter.outputs.cms-service }}
      instructor:      ${{ steps.filter.outputs.instructor-service }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared-lib:
              - 'shared-lib/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
            gateway-service:
              - 'gateway-service/**'
            user-service:
              - 'user-service/**'
            course-service:
              - 'course-service/**'
            enrollment-service:
              - 'enrollment-service/**'
            notification-service:
              - 'notification-service/**'
            shop-service:
              - 'shop-service/**'
            form-service:
              - 'form-service/**'
            admin-service:
              - 'admin-service/**'
            cms-service:
              - 'cms-service/**'
            instructor-service:
              - 'instructor-service/**'

  # ── Compile & test (smart matrix — only changed services) ──────────────────
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway-service
            changed: ${{ needs.changes.outputs.gateway }}
          - service: user-service
            changed: ${{ needs.changes.outputs.user }}
          - service: course-service
            changed: ${{ needs.changes.outputs.course }}
          - service: enrollment-service
            changed: ${{ needs.changes.outputs.enrollment }}
          - service: notification-service
            changed: ${{ needs.changes.outputs.notification }}
          - service: shop-service
            changed: ${{ needs.changes.outputs.shop }}
          - service: form-service
            changed: ${{ needs.changes.outputs.form }}
          - service: admin-service
            changed: ${{ needs.changes.outputs.admin }}
          - service: cms-service
            changed: ${{ needs.changes.outputs.cms }}
          - service: instructor-service
            changed: ${{ needs.changes.outputs.instructor }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        # matrix context is only valid inside steps, not at job-level if
        if: matrix.changed == 'true' || needs.changes.outputs.shared-lib == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        if: matrix.changed == 'true' || needs.changes.outputs.shared-lib == 'true'
        run: chmod +x gradlew

      - name: Build ${{ matrix.service }}
        if: matrix.changed == 'true' || needs.changes.outputs.shared-lib == 'true'
        run: ./gradlew :${{ matrix.service }}:build --no-daemon -x test
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Run unit tests — ${{ matrix.service }}
        if: matrix.changed == 'true' || needs.changes.outputs.shared-lib == 'true'
        run: ./gradlew :${{ matrix.service }}:test --no-daemon -Dspring.profiles.active=test -Djunit.platform.tag.include.pattern=unit

      - name: Run integration tests — ${{ matrix.service }}
        if: matrix.changed == 'true' || needs.changes.outputs.shared-lib == 'true'
        run: ./gradlew :${{ matrix.service }}:test --no-daemon -Dspring.profiles.active=test -Djunit.platform.tag.include.pattern=integration
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && (matrix.changed == 'true' || needs.changes.outputs.shared-lib == 'true')
        with:
          files: ${{ matrix.service }}/build/test-results/**/*.xml
          check_name: "Tests — ${{ matrix.service }}"

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: failure() && (matrix.changed == 'true' || needs.changes.outputs.shared-lib == 'true')
        with:
          name: test-report-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/

  # ── Dockerfile lint ────────────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error   # only fail on errors, warnings are informational

  # ── SonarCloud analysis ────────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result != 'failure'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # SonarCloud needs full git history for blame annotations

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build, test & analyze with SonarCloud
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN not set — skipping SonarCloud analysis"
            exit 0
          fi
          # Run only unit tests (no DB needed) using correct property from build.gradle
          # -Dgroups=unit maps to includeTags in build.gradle test block
          ./gradlew test jacocoTestReport sonar --no-daemon \
            -Dspring.profiles.active=test \
            -Dgroups=unit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

  # ── Final gate — all must pass ─────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build, dockerfile-lint, sonar]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build.result }}" == "failure" || \
                "${{ needs.dockerfile-lint.result }}" == "failure" || \
                "${{ needs.sonar.result }}" == "failure" ]]; then
            # sonar is a HARD gate — bugs/vulns must not reach the server
            echo "❌ CI gate failed"
            exit 1
          fi
          echo "✅ CI gate passed"
