name: Protect Production Branch

on:
  pull_request:
    branches:
      - production

jobs:
  enforce-main-only:
    name: Reject PRs not from main
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          SOURCE="${{ github.head_ref }}"
          echo "PR source branch: $SOURCE"

          if [ "$SOURCE" != "main" ]; then
            echo ""
            echo "❌ REJECTED: PRs to 'production' are only allowed from 'main'."
            echo ""
            echo "  Source branch:  $SOURCE"
            echo "  Allowed branch: main"
            echo ""
            echo "Workflow:"
            echo "  1. Merge your changes into 'main' first (via PR)"
            echo "  2. Then open a PR from 'main' → 'production'"
            echo ""
            exit 1
          fi

          echo "✅ Source branch is 'main' — PR is allowed to proceed."
