version: 2

updates:

  # ── Gradle dependencies (root + all 10 service modules) ────────────────────
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "chore(deps)"
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot*"
          - "io.spring.dependency-management*"
      spring-cloud:
        patterns:
          - "org.springframework.cloud*"
      lombok:
        patterns:
          - "org.projectlombok*"
      testing:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "com.h2database*"
      sonar:
        patterns:
          - "org.sonarqube*"

  # ── GitHub Actions (all workflow files) ────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "actions/*"
          - "dorny/*"
          - "EnricoMi/*"
          - "hadolint/*"
          - "appleboy/*"

  # ── Docker base images ─────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/gateway-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"

